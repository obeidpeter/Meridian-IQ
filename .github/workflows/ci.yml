# CI quality gate (TRD Section 9, CORE-06): merges are blocked on the
# golden-file UBL round-trip tests, the migration rollback test against a real
# Postgres, generated-client drift, full typecheck and production builds.
name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality-gate:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: meridian
          POSTGRES_PASSWORD: meridian
          POSTGRES_DB: meridian_ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U meridian"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      DATABASE_URL: postgresql://meridian:meridian@127.0.0.1:5432/meridian_ci

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Supply-chain gate: fail the build on a HIGH/CRITICAL advisory in a
      # production dependency so a new CVE cannot land silently. Scoped to
      # --prod (build/dev tooling is not shipped) and --audit-level=high so
      # transitive moderates in the dev toolchain do not block merges.
      # Run through pnpm 11 via dlx: npm retired the audit endpoint pnpm 10
      # calls (410 on every run since 2026-07); pnpm 11 uses the bulk advisory
      # endpoint and reads the same v9 lockfile. Install/build/test stay on
      # the workspace's pnpm 10 toolchain.
      - name: Dependency audit (prod, high+)
        run: pnpm dlx pnpm@11 audit --prod --audit-level=high

      # Codegen drift: the OpenAPI spec is the contract; committed generated
      # clients must match it exactly or route validation silently diverges.
      - name: Codegen drift check
        run: |
          pnpm --filter @workspace/api-spec run codegen
          git diff --exit-code -- lib/api-zod lib/api-client-react \
            || { echo "::error::Generated clients are stale — run 'pnpm --filter @workspace/api-spec run codegen' and commit."; exit 1; }

      - name: Typecheck (all packages)
        run: pnpm run typecheck

      # Drift tsc tolerates: unused imports/vars, hook-dependency mistakes.
      # Warnings surface in the log but only errors fail the gate.
      - name: Lint
        run: pnpm run lint

      # The api-server suite now includes DB-backed route tests (party access,
      # alert prefs, push registration) that run inside the RLS contexts, so both
      # the schema AND the guardrail migrations (meridian_app role grants, RLS
      # policies) must exist before they run.
      - name: Prepare database (schema + guardrail migrations)
        run: |
          pnpm --filter @workspace/db run push
          pnpm --filter @workspace/db run migrate

      # Golden-file UBL round-trips, lifecycle, matcher, connector contract —
      # the error catalogue doubling as the regression suite.
      - name: api-server unit tests
        run: pnpm --filter @workspace/api-server run test

      # Pure form math behind the mobile invoice screens (no DB, no Expo).
      - name: mobile unit tests
        run: pnpm --filter @workspace/mobile run test

      # Pure CSV/xlsx import parsing + formatters/error helpers for the SME app.
      - name: SME app unit tests
        run: pnpm --filter @workspace/sme-compliance run test

      # Pure formatters, error helpers and Clerk health metrics for the console.
      - name: Console app unit tests
        run: pnpm --filter @workspace/console run test

      # Buyer-portal-specific badge vocabulary (the shared formatters are
      # covered by the lib suites below).
      - name: Buyer portal unit tests
        run: pnpm --filter @workspace/buyer-portal run test

      # The shared display formatters, API-error policy and headless UI
      # plumbing live in workspace libs (the apps re-export them); their
      # suites are the single home for those behaviors.
      - name: Shared lib unit tests
        run: pnpm --filter @workspace/format --filter @workspace/api-errors --filter @workspace/web-ui run test

      # CORE-06: tables come from drizzle push; the versioned guardrail
      # migrations (triggers, RLS, retention) must apply AND roll back cleanly.
      - name: Migration rollback test (real Postgres)
        run: pnpm --filter @workspace/db run test

      - name: Build landing
        run: pnpm --filter @workspace/landing run build
        env: { BASE_PATH: /, PORT: "3000" }

      - name: Build console
        run: pnpm --filter @workspace/console run build
        env: { BASE_PATH: /console/, PORT: "3000" }

      - name: Build SME app
        run: pnpm --filter @workspace/sme-compliance run build
        env: { BASE_PATH: /app/, PORT: "3000" }

      - name: Build buyer portal
        run: pnpm --filter @workspace/buyer-portal run build
        env: { BASE_PATH: /buyer/, PORT: "3000" }

  # End-to-end user journeys against real builds and a real database: portal
  # auth (incl. throttling + password change), operator Desk, admin advisory,
  # auditor read-only boundary, consent round-trip, credit-note lifecycle.
  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: meridian
          POSTGRES_PASSWORD: meridian
          POSTGRES_DB: meridian_e2e
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U meridian"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      DATABASE_URL: postgresql://meridian:meridian@127.0.0.1:5432/meridian_e2e

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright chromium
        run: pnpm --filter @workspace/scripts exec playwright install --with-deps chromium

      - name: Build api-server
        run: pnpm --filter @workspace/api-server run build

      - name: Build frontends
        run: |
          BASE_PATH=/ PORT=3000 pnpm --filter @workspace/landing run build
          BASE_PATH=/console/ PORT=3000 pnpm --filter @workspace/console run build
          BASE_PATH=/app/ PORT=3000 pnpm --filter @workspace/sme-compliance run build
          BASE_PATH=/buyer/ PORT=3000 pnpm --filter @workspace/buyer-portal run build

      - name: Push schema
        run: pnpm --filter @workspace/db run push

      - name: Run E2E journeys
        run: pnpm --filter @workspace/scripts run e2e
