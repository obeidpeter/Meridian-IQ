kind = "web"
previewPath = "/buyer/"
title = "MeridianIQ Buyer Rails"
version = "1.0.0"
id = "artifacts/buyer-portal"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/buyer/" ]
localPort = 24917

[services.development]
run = "pnpm --filter @workspace/buyer-portal run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/buyer-portal", "run", "build" ]
publicDir = "artifacts/buyer-portal/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "24917"
BASE_PATH = "/buyer/"
