kind = "web"
previewPath = "/"
title = "MeridianIQ Penalty Calculator"
version = "1.0.0"
id = "artifacts/penalty-calculator"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 21831

[services.development]
run = "pnpm --filter @workspace/penalty-calculator run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/penalty-calculator", "run", "build" ]
publicDir = "artifacts/penalty-calculator/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "21831"
BASE_PATH = "/"
