        reviewDueAt:
          type: ["string", "null"]
        createdBy:
          type: string
        submittedBy:
          type: ["string", "null"]
        decidedBy:
          type: ["string", "null"]
        decisionNote:
          type: ["string", "null"]
        supersededById:
          type: ["string", "null"]
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
    ClaimDraftInput:
      type: object
