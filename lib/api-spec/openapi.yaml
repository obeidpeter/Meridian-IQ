openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: MeridianIQ platform API — data spine, compliance rails and consent.
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
  - name: identity
  - name: parties
  - name: engagements
  - name: invoices
  - name: lifecycle
  - name: consent
  - name: verification
  - name: messaging
  - name: platform
  - name: operator
  - name: audit
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /me:
    get:
      operationId: getMe
      tags: [identity]
      summary: Resolve the current principal and capabilities
      responses:
        "200":
          description: Current principal
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Me"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /firms:
    get:
      operationId: listFirms
      tags: [identity]
      responses:
        "200":
          description: Firms
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Firm"
    post:
      operationId: createFirm
      tags: [identity]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/FirmInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Firm"
  /firms/{id}:
    get:
      operationId: getFirm
      tags: [identity]
      parameters:
        - $ref: "#/components/parameters/IdParam"
      responses:
        "200":
          description: Firm
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Firm"
        "404":
          $ref: "#/components/responses/NotFound"

  /users:
    post:
      operationId: createUser
      tags: [identity]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UserInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
  /memberships:
    post:
      operationId: createMembership
      tags: [identity]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MembershipInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Membership"

  /parties:
    get:
      operationId: listParties
      tags: [parties]
      responses:
        "200":
          description: Parties
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Party"
    post:
      operationId: createParty
      tags: [parties]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PartyInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Party"
        "400":
          $ref: "#/components/responses/BadRequest"
  /parties/{id}:
    get:
      operationId: getParty
      tags: [parties]
      parameters:
        - $ref: "#/components/parameters/IdParam"
      responses:
        "200":
          description: Party
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Party"
        "404":
          $ref: "#/components/responses/NotFound"
  /parties/merge:
    post:
      operationId: mergeParties
      tags: [parties]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PartyMergeInput"
      responses:
        "204":
          description: Merged
        "400":
          $ref: "#/components/responses/BadRequest"
  /parties/{id}/split:
    post:
      operationId: splitParty
      tags: [parties]
      parameters:
        - $ref: "#/components/parameters/IdParam"
      responses:
        "204":
          description: Split
        "409":
          $ref: "#/components/responses/Conflict"
  /parties/validate-tin:
    post:
      operationId: validateTin
      tags: [parties]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TinCheckInput"
      responses:
        "200":
          description: Result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/IdentifierCheck"
  /parties/validate-cac:
    post:
      operationId: validateCac
      tags: [parties]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CacCheckInput"
      responses:
        "200":
          description: Result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/IdentifierCheck"

  /parties/{id}/consent:
    get:
      operationId: listConsent
      tags: [consent]
      parameters:
        - $ref: "#/components/parameters/IdParam"
      responses:
        "200":
          description: Consent history
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ConsentRecord"
    post:
      operationId: recordConsent
      tags: [consent]
      parameters:
        - $ref: "#/components/parameters/IdParam"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ConsentInput"
      responses:
        "201":
          description: Recorded
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ConsentRecord"
  /parties/{id}/consent/check/{purpose}:
    get:
      operationId: checkConsent
      tags: [consent]
      parameters:
        - $ref: "#/components/parameters/IdParam"
        - name: purpose
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Permission decision
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ConsentDecision"

  /engagements:
    get:
      operationId: listEngagements
      tags: [engagements]
      responses:
        "200":
          description: Engagements
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Engagement"
    post:
      operationId: createEngagement
      tags: [engagements]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/EngagementInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Engagement"
  /engagements/{id}:
    get:
      operationId: getEngagement
      tags: [engagements]
      parameters:
        - $ref: "#/components/parameters/IdParam"
      responses:
        "200":
          description: Engagement
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Engagement"
        "404":
          $ref: "#/components/responses/NotFound"
    patch:
      operationId: updateEngagement
      tags: [engagements]
      parameters:
        - $ref: "#/components/parameters/IdParam"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/EngagementUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Engagement"

  /invoices:
    get:
      operationId: listInvoices
      tags: [invoices]
      parameters:
        - name: status
          in: query
          required: false
          schema:
            type: string
      responses:
        "200":
          description: Invoices
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Invoice"
    post:
      operationId: createInvoice
      tags: [invoices]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/InvoiceInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InvoiceDetail"
        "400":
          $ref: "#/components/responses/BadRequest"
  /invoices/{id}:
    get:
      operationId: getInvoice
      tags: [invoices]
      parameters:
        - $ref: "#/components/parameters/IdParam"
      responses:
        "200":
          description: Invoice with lines
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InvoiceDetail"
        "404":
          $ref: "#/components/responses/NotFound"
  /invoices/{id}/validate:
    post:
      operationId: validateInvoice
      tags: [invoices]
      parameters:
        - $ref: "#/components/parameters/IdParam"
      responses:
        "200":
          description: Validation result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ValidationResult"
  /invoices/{id}/submit:
    post:
      operationId: submitInvoice
      tags: [invoices]
      parameters:
        - $ref: "#/components/parameters/IdParam"
      responses:
        "202":
          description: Accepted for async submission
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Invoice"
        "403":
          $ref: "#/components/responses/Forbidden"
        "409":
          $ref: "#/components/responses/Conflict"
  /invoices/{id}/ubl:
    get:
      operationId: getInvoiceUbl
      tags: [invoices]
      parameters:
        - $ref: "#/components/parameters/IdParam"
      responses:
        "200":
          description: UBL representation
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UblDocument"
  /invoices/{id}/canonical:
    get:
      operationId: getInvoiceCanonical
      tags: [invoices]
      parameters:
        - $ref: "#/components/parameters/IdParam"
      responses:
        "200":
          description: Canonical representation
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CanonicalInvoice"
  /invoices/{id}/stamp:
    get:
      operationId: getInvoiceStamp
      tags: [lifecycle]
      parameters:
        - $ref: "#/components/parameters/IdParam"
      responses:
        "200":
          description: Stamp record
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StampRecord"
        "404":
          $ref: "#/components/responses/NotFound"
  /invoices/{id}/attempts:
    get:
      operationId: listSubmissionAttempts
      tags: [lifecycle]
      parameters:
        - $ref: "#/components/parameters/IdParam"
      responses:
        "200":
          description: Submission attempts
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/SubmissionAttempt"
  /invoices/{id}/cancel:
    post:
      operationId: cancelInvoice
      tags: [lifecycle]
      parameters:
        - $ref: "#/components/parameters/IdParam"
      responses:
        "200":
          description: Cancelled
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Invoice"
        "409":
          $ref: "#/components/responses/Conflict"

  /invoices/{id}/confirmations:
    get:
      operationId: listConfirmations
      tags: [lifecycle]
      parameters:
        - $ref: "#/components/parameters/IdParam"
      responses:
        "200":
          description: Confirmations
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Confirmation"
    post:
      operationId: createConfirmation
      tags: [lifecycle]
      parameters:
        - $ref: "#/components/parameters/IdParam"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ConfirmationInput"
      responses:
        "201":
          description: Recorded
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Confirmation"

  /invoices/{id}/settlements:
    get:
      operationId: listSettlements
      tags: [lifecycle]
      parameters:
        - $ref: "#/components/parameters/IdParam"
      responses:
        "200":
          description: Settlement events
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/SettlementEvent"
    post:
      operationId: createSettlement
      tags: [lifecycle]
      parameters:
        - $ref: "#/components/parameters/IdParam"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SettlementInput"
      responses:
        "201":
          description: Recorded
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SettlementEvent"

  /verify-stamp:
    post:
      operationId: verifyStamp
      tags: [verification]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/StampVerifyInput"
      responses:
        "200":
          description: Verification result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StampVerifyResult"

  /messages:
    post:
      operationId: sendMessage
      tags: [messaging]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MessageInput"
      responses:
        "201":
          description: Sent
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Message"
        "400":
          $ref: "#/components/responses/BadRequest"
  /messages/{id}/delivery:
    post:
      operationId: recordMessageDelivery
      tags: [messaging]
      parameters:
        - $ref: "#/components/parameters/IdParam"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MessageDeliveryInput"
      responses:
        "204":
          description: Recorded

  /feature-flags:
    get:
      operationId: listFeatureFlags
      tags: [platform]
      responses:
        "200":
          description: Flags
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/FeatureFlag"
  /feature-flags/{key}:
    patch:
      operationId: updateFeatureFlag
      tags: [platform]
      parameters:
        - $ref: "#/components/parameters/KeyParam"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/FeatureFlagUpdate"
      responses:
        "204":
          description: Updated
  /feature-flags/{key}/override:
    post:
      operationId: setFeatureFlagOverride
      tags: [platform]
      parameters:
        - $ref: "#/components/parameters/KeyParam"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/FeatureFlagOverrideInput"
      responses:
        "204":
          description: Set

  /error-catalogue:
    get:
      operationId: listErrorCatalogue
      tags: [operator]
      responses:
        "200":
          description: Error catalogue
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ErrorCatalogueEntry"
    post:
      operationId: upsertErrorCatalogueEntry
      tags: [operator]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ErrorCatalogueUpsertInput"
      responses:
        "201":
          description: Created or updated catalogue entry
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorCatalogueEntry"
  /error-catalogue/{code}:
    get:
      operationId: getErrorCatalogueEntry
      tags: [operator]
      parameters:
        - $ref: "#/components/parameters/CodeParam"
      responses:
        "200":
          description: Catalogue entry
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorCatalogueEntry"
        "404":
          $ref: "#/components/responses/NotFound"
    patch:
      operationId: updateErrorCatalogueEntry
      tags: [operator]
      parameters:
        - $ref: "#/components/parameters/CodeParam"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ErrorCatalogueUpdate"
      responses:
        "200":
          description: Updated catalogue entry
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorCatalogueEntry"
        "404":
          $ref: "#/components/responses/NotFound"
  /operator/dead-letters:
    get:
      operationId: listDeadLetters
      tags: [operator]
      responses:
        "200":
          description: Dead-lettered events
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/OutboxEvent"
  /operator/dead-letters/{id}/replay:
    post:
      operationId: replayDeadLetter
      tags: [operator]
      parameters:
        - $ref: "#/components/parameters/IdParam"
      responses:
        "204":
          description: Replayed
  /operator/reconcile:
    post:
      operationId: reconcilePipeline
      tags: [operator]
      responses:
        "200":
          description: Reconciliation result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReconcileResult"
  /operator/rails:
    get:
      operationId: listRailStates
      tags: [operator]
      responses:
        "200":
          description: Rail states
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/RailState"

  /audit/verify:
    get:
      operationId: verifyAudit
      tags: [audit]
      responses:
        "200":
          description: Chain verification
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuditVerification"
  /audit/export:
    get:
      operationId: exportAudit
      tags: [audit]
      responses:
        "200":
          description: Verifiable audit bundle
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuditBundle"

  /assessments/questionnaire:
    get:
      operationId: getAssessmentQuestionnaire
      tags: [advisory]
      responses:
        "200":
          description: Readiness-assessment questionnaire template
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/QuestionnaireTemplate"
  /assessments:
    post:
      operationId: runAssessment
      tags: [advisory]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RunAssessmentInput"
      responses:
        "201":
          description: Completed readiness assessment
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AssessmentReport"
  /assessments/{id}:
    get:
      operationId: getAssessment
      tags: [advisory]
      parameters:
        - $ref: "#/components/parameters/IdParam"
      responses:
        "200":
          description: Persisted readiness assessment
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AssessmentReport"
        "404":
          $ref: "#/components/responses/NotFound"
  /vat-risk/analyze:
    post:
      operationId: analyzeVatRisk
      tags: [advisory]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/VatRiskInput"
      responses:
        "200":
          description: VAT-risk exposure report and buyer-supplier graph
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VatRiskReport"

components:
  parameters:
    IdParam:
      name: id
      in: path
      required: true
      schema:
        type: string
    KeyParam:
      name: key
      in: path
      required: true
      schema:
        type: string
    CodeParam:
      name: code
      in: path
      required: true
      schema:
        type: string
  responses:
    BadRequest:
      description: Bad request
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
    Unauthorized:
      description: Unauthorized
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
    Forbidden:
      description: Forbidden
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
    NotFound:
      description: Not found
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
    Conflict:
      description: Conflict
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status
    Error:
      type: object
      properties:
        error:
          type: string
      required:
        - error

    Me:
      type: object
      required: [userId, role, capabilities]
      properties:
        userId:
          type: string
        role:
          type: string
        firmId:
          type: ["string", "null"]
        clientPartyId:
          type: ["string", "null"]
        capabilities:
          type: array
          items:
            type: string

    Firm:
      type: object
      required: [id, name, createdAt, updatedAt]
      properties:
        id:
          type: string
        name:
          type: string
        subdomain:
          type: ["string", "null"]
        clerkOrgId:
          type: ["string", "null"]
        partyId:
          type: ["string", "null"]
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
    FirmInput:
      type: object
      required: [name]
      properties:
        name:
          type: string
          minLength: 1
        subdomain:
          type: string
        partyId:
          type: string

    User:
      type: object
      required: [id, email, createdAt]
      properties:
        id:
          type: string
        email:
          type: string
        fullName:
          type: ["string", "null"]
        clerkUserId:
          type: ["string", "null"]
        createdAt:
          type: string
          format: date-time
    UserInput:
      type: object
      required: [email]
      properties:
        email:
          type: string
          minLength: 3
        fullName:
          type: string
        clerkUserId:
          type: string

    Membership:
      type: object
      required: [id, userId, role, createdAt]
      properties:
        id:
          type: string
        userId:
          type: string
        firmId:
          type: ["string", "null"]
        role:
          type: string
        clientPartyId:
          type: ["string", "null"]
        createdAt:
          type: string
          format: date-time
    MembershipInput:
      type: object
      required: [userId, role]
      properties:
        userId:
          type: string
        firmId:
          type: string
        role:
          type: string
          enum:
            [firm_admin, firm_staff, client_user, operator, bank_user, auditor]
        clientPartyId:
          type: string

    Party:
      type: object
      required: [id, type, legalName, tinValidated, countryCode, createdAt, updatedAt]
      properties:
        id:
          type: string
        type:
          type: string
          enum: [client_business, buyer, firm, bank]
        legalName:
          type: string
        tin:
          type: ["string", "null"]
        tinValidated:
          type: boolean
        cacNumber:
          type: ["string", "null"]
        street:
          type: ["string", "null"]
        city:
          type: ["string", "null"]
        countryCode:
          type: string
        mergedIntoId:
          type: ["string", "null"]
        schemaVersion:
          type: integer
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
    PartyInput:
      type: object
      required: [type, legalName]
      properties:
        type:
          type: string
