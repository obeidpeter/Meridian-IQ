          type: integer
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
    BankStatementLine:
      type: object
      required: [id, statementId, lineNo, parseStatus, rawLine, createdAt]
      properties:
        id:
          type: string
        statementId:
          type: string
        lineNo:
          type: integer
        valueDate:
          type: ["string", "null"]
        amount:
          type: ["string", "null"]
        direction:
          type: ["string", "null"]
          enum: [credit, debit, null]
        narration:
          type: ["string", "null"]
        counterpartyRef:
          type: ["string", "null"]
        parseStatus:
          type: string
          enum: [parsed, invalid]
        parseError:
          type: ["string", "null"]
        rawLine:
          type: string
        createdAt:
          type: string
          format: date-time
    StatementImportInput:
      type: object
      required: [clientPartyId, commit]
      properties:
        clientPartyId:
          type: string
        # Exactly one of csv | pdfBase64 (server-enforced). A PDF statement is
        # rasterized and its lines PROPOSED by vision extraction — the preview
        # (commit:false) is the human check before anything commits.
        csv:
          type: string
          minLength: 1
        pdfBase64:
          type: string
          minLength: 1
        formatKey:
          type: string
        filename:
          type: string
        commit:
          type: boolean
    StatementRowResult:
      type: object
      required: [lineNo, parseStatus]
      properties:
        lineNo:
          type: integer
        parseStatus:
          type: string
          enum: [parsed, invalid]
        valueDate:
          type: ["string", "null"]
        amount:
          type: ["string", "null"]
        direction:
          type: ["string", "null"]
          enum: [credit, debit, null]
        narration:
          type: ["string", "null"]
        error:
          type: ["string", "null"]
    StatementImportResult:
      type: object
      required: [statementId, committed, formatKey, lineCount, parsedCount, parseRate, rows]
      properties:
        statementId:
          type: ["string", "null"]
        committed:
          type: boolean
        # PDF previews only: the deterministic CSV rendering of the model's
        # proposed lines. Commit by POSTing this back as `csv` — the rows the
        # user checked are exactly the rows that commit; a PDF with
        # commit:true is refused so extraction can never silently re-run.
        proposedCsv:
          type: ["string", "null"]
        formatKey:
          type: ["string", "null"]
        accountRef:
          type: ["string", "null"]
        lineCount:
          type: integer
        parsedCount:
          type: integer
        parseRate:
          type: number
        rows:
          type: array
          items:
            $ref: "#/components/schemas/StatementRowResult"
    MatchProposalView:
      type: object
