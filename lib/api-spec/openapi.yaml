        # Chase ladder (round-14): the reminder number this draft IS (logged
        # reminders + 1) and what came before it. Tone escalates with the
        # stage — never into threats.
        stage:
          type: integer
        previousReminders:
          type: object
          required: [count, lastAt]
          properties:
            count:
              type: integer
            lastAt:
              type: string
              nullable: true
    ChaseLogSummary:
      type: object
      required: [invoiceId, count, lastAt, stage]
      properties:
        invoiceId:
          type: string
          format: uuid
        count:
          type: integer
        lastAt:
          type: string
          nullable: true
        # The reminder number the log row just recorded.
        stage:
          type: integer
    UnmatchedCredits:
      type: object
      required:
        [asOf, windowDays, count, totalAmount, rows, truncated, note]
      properties:
        asOf:
          type: string
        windowDays:
          type: integer
        # Uncapped window totals — the capped row list never deflates them.
        count:
          type: integer
        totalAmount:
          type: string
        rows:
          type: array
          items:
            type: object
            required:
              [lineId, statementId, valueDate, amount, narration, counterpartyRef]
            properties:
              lineId:
                type: string
                format: uuid
              statementId:
                type: string
                format: uuid
              valueDate:
                type: string
              amount:
                type: string
              narration:
                type: string
                nullable: true
              counterpartyRef:
                type: string
                nullable: true
        truncated:
          type: boolean
        # The advisory framing — money can arrive without an invoice for many
        # legitimate reasons; this is a prompt to check, never an accusation.
        note:
          type: string
    ProjectionAccuracy:
      type: object
      required:
        [
          asOf,
          withinDays,
          settlements,
          medianErrorDays,
          medianAbsErrorDays,
          withinShare,
          basisSplit,
          buyers,
          note,
        ]
      properties:
        asOf:
          type: string
        withinDays:
          type: integer
        settlements:
          type: integer
        # Signed: positive = money arrived LATER than projected. Nulls when
        # no settlements have been observed.
        medianErrorDays:
          type: number
          nullable: true
        medianAbsErrorDays:
          type: number
          nullable: true
        withinShare:
          type: number
          nullable: true
        # Which tier of the projection rule predicted each settlement.
        basisSplit:
          type: object
          required: [rhythm, dueDate, defaultTerms]
          properties:
            rhythm:
              type: integer
            dueDate:
              type: integer
            defaultTerms:
              type: integer
        buyers:
          type: array
          items:
            type: object
            required:
              [
                buyerPartyId,
                buyerName,
                settlements,
                medianErrorDays,
                medianAbsErrorDays,
                withinShare,
              ]
            properties:
              buyerPartyId:
                type: string
                format: uuid
              buyerName:
                type: string
              settlements:
                type: integer
              medianErrorDays:
                type: number
              medianAbsErrorDays:
                type: number
              withinShare:
                type: number
        note:
          type: string
    ClerkTierReport:
      type: object
      required: [windowDays, totalTokens, baseModel, rows]
      properties:
        windowDays:
          type: integer
        totalTokens:
          type: integer
        baseModel:
          type: string
        rows:
          type: array
          items:
            type: object
            required:
              [
                purpose,
                calls,
                totalTokens,
                spendShare,
                okCount,
                invalidCount,
                errorCount,
                killedCount,
                validRate,
                currentModel,
                tiered,
                recommendation,
                reason,
              ]
            properties:
              purpose:
                type: string
              calls:
                type: integer
              totalTokens:
                type: integer
              spendShare:
                type: number
              okCount:
                type: integer
              invalidCount:
                type: integer
              errorCount:
                type: integer
              # Kill-switch rejections — excluded from validRate's denominator.
              killedCount:
                type: integer
              validRate:
                type: number
              currentModel:
                type: string
              tiered:
                type: boolean
              recommendation:
                type: string
                enum: [candidate, keep, tiered, revert, insufficient_data]
              reason:
                type: string

    ClerkUsage:
      type: object
      required: [monthStart, usedTokens, budgetTokens, projectedTokens, paceBand, byPurpose]
      properties:
        monthStart:
          type: string
          format: date-time
        usedTokens:
          type: integer
        budgetTokens:
          type: integer
        # Budget pace (idea #7): month-end projection at the current burn rate
        # and its band, computed over the SAME UTC month boundary the 429
        # enforcement uses. "warning" = 80% used or projected past the
        # allowance (after a quarter of the month); "critical" = spent.
        projectedTokens:
          type: integer
        paceBand:
          type: string
          enum: [ok, warning, critical]
        # Spend transparency: month-to-date tokens split by ledger purpose,
        # largest first, so a firm nearing its cap can see WHICH Clerk
        # feature is consuming the allowance.
        byPurpose:
          type: array
          items:
            type: object
            required: [purpose, tokens]
            properties:
              purpose:
                type: string
              tokens:
                type: integer

    ClerkEvalRun:
      type: object
      required:
        [
          id,
          startedBy,
          model,
          promptVersion,
          fixtureCount,
          fieldsCompared,
          fieldsCorrect,
          accuracy,
          injectionFixtures,
          injectionResisted,
          results,
          durationMs,
          createdAt,
        ]
      properties:
        id:
          type: string
        startedBy:
          type: ["string", "null"]
        model:
          type: string
        promptVersion:
          type: string
        fixtureCount:
          type: integer
        fieldsCompared:
          type: integer
        fieldsCorrect:
          type: integer
        accuracy:
          type: ["number", "null"]
        injectionFixtures:
          type: integer
        injectionResisted:
          type: integer
        results:
          type: array
          items:
            $ref: "#/components/schemas/ClerkEvalFixtureResult"
        durationMs:
          type: integer
        createdAt:
          type: string
          format: date-time
