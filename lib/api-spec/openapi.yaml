          type: string
          minLength: 3
        proposition:
          type: string
          minLength: 10
        protectedFacts:
          type: array
          items:
            $ref: "#/components/schemas/ProtectedFact"
        citation:
          type: string
          minLength: 3
        applicability:
          $ref: "#/components/schemas/ClaimApplicability"
        effectiveFrom:
          type: string
        effectiveTo:
          type: ["string", "null"]
        reviewDueAt:
          type: ["string", "null"]
    ClaimDecisionInput:
      type: object
      required: [action]
      properties:
        action:
          type: string
          enum: [approve, reject, suspend, resume]
        note:
          type: ["string", "null"]
    ClerkExtractionField:
      type: object
      required: [field, value, confidence, sourceSnippet, critical, flagged]
      properties:
        field:
          type: string
        value:
          type: ["string", "null"]
        confidence:
          type: number
        sourceSnippet:
          type: ["string", "null"]
        critical:
          type: boolean
        flagged:
          type: boolean
    ClerkExtractionLine:
      type: object
      required: [description, quantity, unitPrice, vatRate, confidence]
      properties:
        description:
          type: ["string", "null"]
        quantity:
          type: ["string", "null"]
        unitPrice:
          type: ["string", "null"]
        vatRate:
          type: ["string", "null"]
        confidence:
          type: number
    ClerkExtraction:
      type: object
      required: [fields, lines, promptVersion, model]
      properties:
        fields:
          type: array
          items:
            $ref: "#/components/schemas/ClerkExtractionField"
        lines:
          type: array
          items:
            $ref: "#/components/schemas/ClerkExtractionLine"
        # Supplier memory: the approved case whose fixture rode along as the
        # one-shot example (absent when extracted cold).
        exemplarCaseId:
          type: string
        promptVersion:
          type: string
        model:
          type: string
    ClerkAnswer:
      type: object
      required: [answered]
      properties:
        answered:
          type: boolean
        claimId:
          type: string
        claimKey:
          type: string
        claimVersion:
          type: integer
        # Set when the answer came from a platform-computed firm-record lookup
        # (idea #6) instead of a claims-register proposition.
        dataIntent:
          type: string
        # App-resolved lookup parameters for display (idea #4), e.g.
        # {month: "May 2026", client: "Adaeze Foods Ltd"}.
        dataParams:
          type: object
          additionalProperties:
            type: string
        proposition:
          type: string
        facts:
          type: array
          items:
            $ref: "#/components/schemas/ProtectedFact"
        citation:
          type: string
        refusalReason:
          type: string
    ClerkCase:
      type: object
      required: [id, kind, status, createdBy, createdAt, updatedAt]
      properties:
        id:
          type: string
        kind:
          type: string
          enum: [extraction, question]
        status:
          type: string
          enum: [pending, extracted, in_review, approved, rejected, escalated, failed]
        sourceType:
          type: ["string", "null"]
        sourceName:
          type: ["string", "null"]
        sourceText:
          type: ["string", "null"]
        sourceImageB64:
          type: ["string", "null"]
        sourceHash:
          type: ["string", "null"]
        sourceDurationSec:
          type: ["integer", "null"]
        # Deterministic pre-flight issues computed at extraction time (empty =
        # clean; null = computed before this feature existed). "advisory"
        # issues inform the reviewer without blocking the fast lane.
        preflight:
          type: ["array", "null"]
          items:
            type: object
            required: [field, message]
            properties:
              field:
                type: string
              message:
                type: string
              severity:
                type: string
                enum: [advisory]
        extraction:
          anyOf:
            - $ref: "#/components/schemas/ClerkExtraction"
            - type: "null"
        question:
          type: ["string", "null"]
        answer:
          anyOf:
            - $ref: "#/components/schemas/ClerkAnswer"
            - type: "null"
        firmId:
          type: ["string", "null"]
        # The async batch this case came out of (null for one-off captures) —
        # the review queue groups a bundle's segments together.
        batchId:
          type: ["string", "null"]
        claimedBy:
          type: ["string", "null"]
        claimedAt:
          type: ["string", "null"]
          format: date-time
        createdBy:
          type: string
        decidedBy:
          type: ["string", "null"]
        decisionAction:
          type: ["string", "null"]
        decisionReason:
          type: ["string", "null"]
        corrections:
          type: ["array", "null"]
          items:
            $ref: "#/components/schemas/ClerkCorrection"
        createdInvoiceId:
          type: ["string", "null"]
        failReason:
          type: ["string", "null"]
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
    ClerkCaseCreateInput:
      type: object
      required: [sourceType]
      properties:
        sourceType:
          type: string
          enum: [image, pdf, text, voice]
        name:
          type: string
        contentType:
          type: string
        imageBase64:
          type: string
        pdfBase64:
          type: string
        text:
          type: string
        audioBase64:
          type: string
        durationSec:
          type: integer
          minimum: 0
        allowDuplicate:
          type: boolean
    ClerkCaseDecisionInput:
      type: object
      required: [action]
      properties:
        action:
          type: string
          enum: [approve, reject, escalate]
        reason:
          type: ["string", "null"]
        firmId:
          type: string
        supplierPartyId:
          type: string
        buyerPartyId:
          type: string
        invoiceNumber:
          type: string
        issueDate:
          type: string
        dueDate:
          type: ["string", "null"]
        currency:
          type: string
        category:
          type: string
          enum: [b2b, b2g, b2c]
        lines:
          type: array
          items:
            $ref: "#/components/schemas/InvoiceLineInput"
    ClerkBulkApproveInput:
      type: object
      required: [items]
      properties:
        items:
          type: array
          minItems: 1
          maxItems: 50
          items:
            type: object
            required: [caseId, decision]
            properties:
              caseId:
                type: string
                format: uuid
              decision:
                $ref: "#/components/schemas/ClerkCaseDecisionInput"
    ClerkBulkApproveReport:
      type: object
      required: [results]
      properties:
        results:
          type: array
          items:
            type: object
            required: [caseId, outcome]
            properties:
              caseId:
                type: string
              outcome:
                type: string
                enum: [approved, skipped]
              reason:
                type: ["string", "null"]
    AskClerkInput:
      type: object
      required: [question]
      properties:
        question:
          type: string
          minLength: 3
          maxLength: 2000
        # Multi-turn (round 12): the asker's previous question case in this
        # thread. The server re-verifies firm ownership before any of its
        # platform-recorded context reaches the classifier.
        previousCaseId:
          type: string
          format: uuid
    StatusLight:
      type: object
      required: [light, reasons, recommendedAction]
      properties:
        light:
          type: string
          enum: [green, amber, red]
        reasons:
          type: array
          items:
            type: string
        recommendedAction:
          type: string
    ClerkMetrics:
      type: object
      required:
        [
          windowDays,
          cases,
          inference,
          cost,
          economics,
          corrections,
          supplierAccuracy,
          ask,
          injectionTrend,
          platformSpend,
        ]
      properties:
        windowDays:
          type: integer
        # Confidence calibration from the corrections exhaust: for approved
        # extraction cases, how often a field at a given model confidence was
        # kept unchanged by the operator. Optional: absent when no corrected
        # approvals exist in the window.
        calibration:
          type: object
          required: [sampleFields, buckets]
          properties:
            sampleFields:
              type: integer
            buckets:
              type: array
              items:
                type: object
                required: [range, fields, meanConfidence, keptRate]
                properties:
                  range:
                    type: string
                  fields:
                    type: integer
                  meanConfidence:
                    type: number
                  keptRate:
                    type: number
        cases:
          type: object
          required: [total, byStatus, byKind]
          properties:
            total:
              type: integer
            byStatus:
              type: object
              additionalProperties:
                type: integer
            byKind:
              type: object
              additionalProperties:
                type: integer
            avgDecisionMinutes:
              type: ["number", "null"]
            avgQueueWaitMinutes:
              type: ["number", "null"]
            avgActiveReviewMinutes:
              type: ["number", "null"]
        inference:
          type: object
          required: [total, byOutcome, invalidRate, errorRate, cohorts]
          properties:
            total:
              type: integer
            byOutcome:
              type: object
              additionalProperties:
                type: integer
            invalidRate:
              type: number
            errorRate:
              type: number
            latencyP50Ms:
              type: ["integer", "null"]
            latencyP95Ms:
              type: ["integer", "null"]
            cohorts:
              type: array
              items:
                type: object
                required: [model, promptVersion, purpose, total, okCount]
                properties:
                  model:
                    type: string
                  promptVersion:
                    type: string
                  purpose:
                    type: string
                  total:
                    type: integer
                  okCount:
                    type: integer
                  latencyP95Ms:
                    type: ["integer", "null"]
        cost:
          type: object
          required: [promptTokens, completionTokens, callsWithUsage]
          properties:
            promptTokens:
              type: integer
            completionTokens:
              type: integer
            callsWithUsage:
              type: integer
            tokensPerDecidedCase:
              type: ["number", "null"]
            estimatedUsd:
              type: ["number", "null"]
        # Unit economics (idea #8): pure SQL over the inference ledger. Per
        # purpose inside the metrics window, and a per-month failure taxonomy
        # over the trailing months (independent of windowDays).
        economics:
          type: object
          required: [byPurpose, months]
          properties:
            byPurpose:
              type: array
              items:
                type: object
                required:
                  [purpose, calls, promptTokens, completionTokens, errorCount]
                properties:
                  purpose:
                    type: string
                  calls:
                    type: integer
                  promptTokens:
                    type: integer
                  completionTokens:
                    type: integer
                  errorCount:
                    type: integer
                  estimatedUsd:
                    type: ["number", "null"]
            months:
              type: array
              items:
                type: object
                required:
                  [
                    month,
                    calls,
                    promptTokens,
                    completionTokens,
                    okCount,
                    invalidCount,
                    killedCount,
                    errorCount,
                  ]
                properties:
                  month:
                    type: string
                  calls:
                    type: integer
                  promptTokens:
                    type: integer
                  completionTokens:
                    type: integer
                  okCount:
                    type: integer
                  invalidCount:
                    type: integer
                  killedCount:
                    type: integer
                  errorCount:
                    type: integer
        corrections:
          type: array
          items:
            type: object
            required: [field, total, overridden, overrideRate]
            properties:
              field:
                type: string
              total:
                type: integer
              overridden:
                type: integer
              overrideRate:
                type: number
        # Correction-shape mining: the same corrections exhaust classified by
        # the SHAPE of each override (day/month flip, percent-vs-fraction VAT,
        # power-of-ten scale, missed/hallucinated value, ...) — deterministic
        # string/number analysis, zero model calls. Optional: absent when the
        # window holds no changed corrections. Line fields aggregate under
        # their normalized name (lines.3.vatRate -> lines.vatRate).
        correctionShapes:
          type: array
          items:
            type: object
            required: [field, shape, count, exampleExtracted, exampleFinal]
            properties:
              field:
                type: string
              shape:
                type: string
              count:
                type: integer
              exampleExtracted:
                type: ["string", "null"]
              exampleFinal:
                type: ["string", "null"]
        # Per-supplier override rates from the corrections exhaust (idea #9):
        # which suppliers' documents Clerk reads worst. Supplier identity is
        # the approved invoice's register party, never an extracted string.
        supplierAccuracy:
          type: array
          items:
            type: object
            required:
              [supplierName, firmName, cases, fieldsCompared, overridden, overrideRate]
            properties:
              supplierName:
                type: string
              firmName:
                type: ["string", "null"]
              cases:
                type: integer
              fieldsCompared:
                type: integer
              overridden:
                type: integer
              overrideRate:
                type: number
        ask:
          type: object
          required: [total, answered, refused, refusalRate]
          properties:
            total:
              type: integer
            answered:
              type: integer
            refused:
              type: integer
            refusalRate:
              type: number
        # Platform month-to-date spend from the ledger (pure SQL): the number
        # the provider invoice arrives against, with a linear month-pace
        # projection on the same UTC boundary as the per-firm budget.
        platformSpend:
          type: object
          required:
            [
              month,
              promptTokens,
              completionTokens,
              totalTokens,
              firmFundedTokens,
              platformFundedTokens,
              estimatedUsd,
              projectedTokens,
              projectedUsd,
            ]
          properties:
            month:
              type: string
            promptTokens:
              type: integer
            completionTokens:
              type: integer
            totalTokens:
              type: integer
            firmFundedTokens:
              type: integer
            platformFundedTokens:
              type: integer
            estimatedUsd:
              type: ["number", "null"]
            projectedTokens:
              type: integer
            projectedUsd:
              type: ["number", "null"]
        # Injection-resistance trend from the stored eval runs (pure SQL):
        # monthly drift plus the per-prompt-version split.
        injectionTrend:
          type: object
          required: [months, byPromptVersion]
          properties:
            months:
              type: array
              items:
                type: object
                required:
                  [month, runs, injectionFixtures, injectionResisted, resistanceRate]
                properties:
                  month:
                    type: string
                  runs:
                    type: integer
                  injectionFixtures:
                    type: integer
                  injectionResisted:
                    type: integer
                  resistanceRate:
                    type: number
            byPromptVersion:
              type: array
              items:
                type: object
                required:
                  [promptVersion, runs, injectionFixtures, injectionResisted, resistanceRate]
                properties:
                  promptVersion:
                    type: string
                  runs:
                    type: integer
                  injectionFixtures:
                    type: integer
                  injectionResisted:
                    type: integer
                  resistanceRate:
                    type: number
        # Present when the newest measured month's injection resistance fell
        # materially below the previous one — the same deterministic rule the
        # resistance-watch sweep alerts on, so banner and alert always agree.
        resistanceAlert:
          type: object
          required: [fromMonth, toMonth, fromRate, toRate, injectionFixtures]
          properties:
            fromMonth:
              type: string
            toMonth:
              type: string
            fromRate:
              type: number
            toRate:
              type: number
            injectionFixtures:
              type: integer
        # Kept-rate drift: monthly kept-rate buckets from the corrections
        # exhaust (fields the operator left unchanged / fields compared) —
        # the accuracy sibling of the injection trend. Optional: absent when
        # the exhaust holds no measured months.
        keptRateTrend:
          type: array
          items:
            type: object
            required: [month, fields, keptRate]
            properties:
              month:
                type: string
              fields:
                type: integer
              keptRate:
                type: number
        # Present when the newest measured month's kept-rate fell materially
        # below the previous one — the same deterministic rule the
        # quality-watch sweep alerts on, so banner and alert always agree.
        qualityAlert:
          type: object
          required: [fromMonth, toMonth, fromRate, toRate, fields]
          properties:
            fromMonth:
              type: string
            toMonth:
              type: string
            fromRate:
              type: number
            toRate:
              type: number
            fields:
              type: integer
    ClerkCorrection:
      type: object
      required: [field, extracted, final, changed]
      properties:
        field:
          type: string
        extracted:
          type: ["string", "null"]
        final:
          type: ["string", "null"]
        changed:
          type: boolean
    ClerkPartySuggestion:
      type: object
      required: [partyId, legalName, tin, type, confidence, tinScore, nameScore]
      properties:
        partyId:
          type: string
        legalName:
          type: string
        tin:
          type: ["string", "null"]
        type:
          type: string
        confidence:
          type: number
        tinScore:
          type: number
        nameScore:
          type: number
        # Alias memory (idea #6): this suggestion is a remembered pairing a
        # human previously confirmed, not a fresh score.
        viaAlias:
          type: boolean
    ClerkPartySuggestions:
      type: object
      required: [supplier, buyer]
      properties:
        supplier:
          type: array
