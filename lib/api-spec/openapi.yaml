        "200":
          description: The released case
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ClerkCase"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"
  /clerk/cases/{id}/party-suggestions:
    get:
      operationId: getClerkPartySuggestions
      tags: [clerk]
      summary: Party candidates matched from the extracted names and TINs
      parameters:
        - $ref: "#/components/parameters/IdParam"
      responses:
        "200":
          description: Scored supplier and buyer candidates (best first)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ClerkPartySuggestions"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"
  /clerk/eval/run:
    post:
      operationId: runClerkEval
      tags: [clerk]
