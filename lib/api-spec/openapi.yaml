        supplierPartyId:
          type: string
        buyerPartyId:
          type: string
        name:
          type: string
          minLength: 1
          maxLength: 120
        cadence:
          type: string
          enum: [weekly, monthly]
        # First issue date to materialize; subsequent runs advance by cadence.
        startDate:
          type: string
        currency:
          type: string
        notes:
          type: string
        lines:
          type: array
          minItems: 1
          items:
            $ref: "#/components/schemas/InvoiceLineInput"
    RecurringInvoiceTemplateUpdateInput:
      type: object
      required: [active]
      properties:
        active:
          type: boolean
    RecurringInvoiceTemplate:
      type: object
      required:
        [id, firmId, supplierPartyId, buyerPartyId, name, cadence, nextRunDate, active, lines, createdAt, updatedAt]
      properties:
        id:
          type: string
        firmId:
          type: string
        supplierPartyId:
          type: string
        buyerPartyId:
          type: string
        name:
          type: string
        cadence:
          type: string
          enum: [weekly, monthly]
        nextRunDate:
          type: string
        active:
          type: boolean
        currency:
          type: ["string", "null"]
        notes:
          type: ["string", "null"]
        lines:
          type: array
          items:
            $ref: "#/components/schemas/InvoiceLineInput"
        lastInvoiceId:
          type: ["string", "null"]
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
    RecurringSuggestion:
      type: object
      required: [buyerPartyId, buyerName, count, medianAmount, lastIssueDate, lines]
      properties:
        buyerPartyId:
          type: string
          format: uuid
        buyerName:
          type: string
        # How many invoices matched the monthly pattern.
        count:
          type: integer
        medianAmount:
          type: string
        lastIssueDate:
          type: string
        # Seed lines from the newest invoice in the pattern, ready to prefill
        # the template dialog.
        lines:
          type: array
          items:
            $ref: "#/components/schemas/InvoiceLineInput"
    UnbilledIncomeAlert:
      type: object
      required:
        [
          buyerPartyId,
          buyerName,
          count,
          medianAmount,
          medianGapDays,
          lastIssueDate,
          expectedByDate,
          overdueDays,
        ]
      properties:
        buyerPartyId:
          type: string
          format: uuid
        buyerName:
          type: string
        # How many invoices matched the monthly pattern.
        count:
          type: integer
        medianAmount:
          type: string
        # The pattern's observed billing cadence in days.
        medianGapDays:
          type: integer
        lastIssueDate:
          type: string
        # lastIssueDate + medianGapDays — when the next invoice was expected.
        expectedByDate:
          type: string
        overdueDays:
          type: integer
    VatPack:
      type: object
      required: [monthStart, monthLabel, months, rows, totals, note]
      properties:
        monthStart:
          type: string
        monthLabel:
          type: string
        # The closed Lagos months a pack may be requested for (newest first).
        months:
          type: array
          items:
            type: string
        # Issue-month basis, rails-accepted documents only, credit notes
        # netted, cancelled excluded — see `note` for the full disclosure.
        rows:
          type: array
          items:
            type: object
            required:
              [
                clientPartyId,
                clientName,
                acceptedCount,
                acceptedTotal,
                acceptedVat,
                creditCount,
                creditVat,
                netVat,
              ]
            properties:
              clientPartyId:
                type: string
                format: uuid
              clientName:
                type: string
              acceptedCount:
                type: integer
              acceptedTotal:
                type: string
              acceptedVat:
                type: string
              creditCount:
                type: integer
              creditVat:
                type: string
              netVat:
                type: string
        totals:
          type: object
          required:
            [acceptedCount, acceptedTotal, acceptedVat, creditCount, creditVat, netVat]
          properties:
            acceptedCount:
              type: integer
            acceptedTotal:
              type: string
            acceptedVat:
              type: string
            creditCount:
              type: integer
            creditVat:
              type: string
            netVat:
              type: string
        note:
          type: string
    DraftVatCoverNoteInput:
      type: object
      properties:
        month:
          type: string
          pattern: '^\d{4}-\d{2}-01$'
    VatSettlementCheck:
      type: object
      required:
        [
          monthStart,
          monthLabel,
          months,
          acceptedCount,
          acceptedTotal,
          settledCount,
          settledTotal,
          outstandingCount,
          outstandingTotal,
          creditedCount,
          creditedTotal,
          otherCount,
          otherTotal,
          settledShare,
          unsettled,
          unsettledTruncated,
          note,
        ]
      properties:
        monthStart:
          type: string
        monthLabel:
          type: string
        months:
          type: array
          items:
            type: string
        # The pack month's accepted invoices (the VAT pack's population,
        # invoices only) split by what settlement the platform has OBSERVED.
        acceptedCount:
          type: integer
        acceptedTotal:
          type: string
        settledCount:
          type: integer
        settledTotal:
          type: string
        outstandingCount:
          type: integer
        outstandingTotal:
          type: string
        creditedCount:
          type: integer
        creditedTotal:
          type: string
        # Partition guard: accepted invoices in a lifecycle state outside the
        # three buckets (unreachable through normal flows) — surfaced, never
        # silently absorbed into the share's denominator.
        otherCount:
          type: integer
        otherTotal:
          type: string
        # settledTotal / acceptedTotal (4dp); null when the month had no
        # value or mixes currencies (a share of unlike units is not a number).
        settledShare:
          type: number
          nullable: true
        unsettled:
          type: array
          items:
            type: object
            required:
              [
                invoiceId,
                invoiceNumber,
                clientName,
                buyerName,
                issueDate,
                dueDate,
                currency,
                grandTotal,
                status,
              ]
            properties:
              invoiceId:
                type: string
                format: uuid
              invoiceNumber:
                type: string
              clientName:
                type: string
              buyerName:
                type: string
              issueDate:
                type: string
              dueDate:
                type: string
                nullable: true
              currency:
                type: string
              grandTotal:
                type: string
              status:
                type: string
        unsettledTruncated:
          type: boolean
        # Assurance-not-accusation disclosure — travels with every render.
        note:
          type: string
    QuarterlyReview:
      type: object
      required:
        [
          quarterStart,
          quarterLabel,
          quarters,
          months,
          vatTotals,
          submissions,
          topRejections,
          rejectionTotal,
          receivables,
          clerk,
          note,
        ]
      properties:
        quarterStart:
          type: string
        quarterLabel:
          type: string
        # The closed Lagos quarters on offer (newest first, first-month keys).
        quarters:
          type: array
          items:
            type: string
        # Per month: the monthly VAT pack's totals, unchanged.
        months:
          type: array
          items:
            type: object
            required:
              [monthStart, monthLabel, acceptedCount, acceptedVat, creditVat, netVat]
            properties:
              monthStart:
                type: string
              monthLabel:
                type: string
              acceptedCount:
                type: integer
              acceptedVat:
                type: string
              creditVat:
                type: string
              netVat:
                type: string
        vatTotals:
          type: object
          required: [acceptedCount, creditCount, acceptedVat, creditVat, netVat]
          properties:
            acceptedCount:
              type: integer
            creditCount:
              type: integer
            acceptedVat:
              type: string
            creditVat:
              type: string
            netVat:
              type: string
        submissions:
          type: object
          required: [accepted, rejected]
          properties:
            accepted:
              type: integer
            rejected:
              type: integer
        # Top rejection codes (capped); rejectionTotal comes from the same
        # SQL pass so the quarter total stays honest beyond the cap.
        topRejections:
          type: array
          items:
            type: object
            required: [errorCode, category, count]
            properties:
              errorCode:
                type: string
              category:
                type: string
                nullable: true
              count:
                type: integer
        rejectionTotal:
          type: integer
        # As-of-generation snapshot, per currency — a balance has no quarter.
        receivables:
          type: object
          required: [asOf, groups]
          properties:
            asOf:
              type: string
            groups:
              type: array
              items:
                type: object
                required: [currency, outstandingTotal, invoiceCount]
                properties:
                  currency:
                    type: string
                  outstandingTotal:
                    type: string
                  invoiceCount:
                    type: integer
        clerk:
          type: object
          required: [captures, approved, rejected]
          properties:
            captures:
              type: integer
            approved:
              type: integer
            rejected:
              type: integer
        note:
          type: string
    DraftQuarterlyNoteInput:
      type: object
      properties:
        quarter:
          type: string
          pattern: '^\d{4}-\d{2}-01$'
    QuarterlyReviewCoverNote:
      type: object
      required: [quarterStart, quarterLabel, note, source, disclosure]
      properties:
        quarterStart:
          type: string
        quarterLabel:
          type: string
        # The drafted text — the partner edits and owns it; nothing is stored.
        note:
          type: string
        source:
          type: string
          enum: [clerk, template]
        # The pack's basis note, so the caveats travel with the text.
        disclosure:
          type: string
    CatalogueCoverageReport:
      type: object
      required:
        [
          windowDays,
          slaWindowDays,
          codedRejections,
          mappedAttempts,
          mappedShare,
          uncodedRejections,
          distinctCodes,
          mappedCodes,
          openUnmapped,
          unmappedTruncated,
          sla,
          recentMappings,
        ]
      properties:
        windowDays:
          type: integer
        slaWindowDays:
          type: integer
        # CODED rejected attempts in the window (uncoded rejections sit in
        # their own bucket — they can never be mapped), and how many carry a
        # code the catalogue maps TODAY (current-state coverage).
        codedRejections:
          type: integer
        mappedAttempts:
          type: integer
        mappedShare:
          type: number
          nullable: true
        uncodedRejections:
          type: integer
        distinctCodes:
          type: integer
        mappedCodes:
          type: integer
        # Currently-unmapped codes, oldest mapping debt first.
        openUnmapped:
          type: array
          items:
            type: object
            required: [code, occurrences, firstSeen, lastSeen, openCase]
            properties:
              code:
                type: string
              occurrences:
                type: integer
              firstSeen:
                type: string
              lastSeen:
                type: string
              openCase:
                type: boolean
        unmappedTruncated:
          type: boolean
        # INT-02 SLA over entries created in the SLA window that were SEEN
        # before being mapped; proactive entries are counted, never judged.
        sla:
          type: object
          required:
            [judged, avgDaysToMap, maxDaysToMap, withinOneDayShare, proactive]
          properties:
            judged:
              type: integer
            avgDaysToMap:
              type: number
              nullable: true
            maxDaysToMap:
              type: number
              nullable: true
            withinOneDayShare:
              type: number
              nullable: true
            proactive:
              type: integer
        recentMappings:
          type: array
          items:
            type: object
            required: [code, firstSeen, mappedAt, daysToMap]
            properties:
              code:
                type: string
              firstSeen:
                type: string
              mappedAt:
                type: string
              daysToMap:
                type: number
    VatPackCoverNote:
      type: object
      required: [monthStart, monthLabel, note, source, disclosure]
      properties:
        monthStart:
          type: string
        monthLabel:
          type: string
        # The drafted text — the partner edits and owns it; nothing is stored.
        note:
          type: string
        source:
          type: string
          enum: [clerk, template]
        # The pack's basis note, so the caveats travel with the text.
        disclosure:
          type: string
    LineItemSuggestion:
      type: object
      required: [key, description, count, medianUnitPrice, vatRate, lastUsed]
      properties:
        # Normalized item identity (order/case/punctuation-insensitive).
        key:
          type: string
        # The most recently used literal description.
        description:
          type: string
        count:
          type: integer
        medianUnitPrice:
          type: string
        vatRate:
          type: string
        lastUsed:
          type: string
    BuyerPaymentBehaviour:
      type: object
      required:
        [buyerPartyId, buyerName, settledCount, medianDaysToPay, lastSettledDate]
      properties:
        buyerPartyId:
          type: string
          format: uuid
        buyerName:
          type: string
        # Accepted reconciliation matches behind the median (3+ required).
        settledCount:
          type: integer
        # Median days from invoice issue to the matched statement credit.
        medianDaysToPay:
          type: integer
        lastSettledDate:
          type: string
    ComplianceCalendar:
      type: object
      required: [horizonDays, overdue, days]
      properties:
        horizonDays:
          type: integer
        overdue:
          type: object
          required: [invoices, clients]
          properties:
            invoices:
              type: integer
            clients:
              type: integer
        days:
          type: array
          items:
            type: object
            required: [date, events]
            properties:
              date:
                type: string
              events:
                type: array
                items:
                  type: object
                  required: [kind, label]
                  properties:
                    kind:
                      type: string
                      enum: [invoice_submission, vat_return]
                    label:
                      type: string
                    invoices:
                      type: integer
                    clients:
                      type: integer
    RejectionPatternReport:
      type: object
      required: [windowDays, totalRejections, previousTotal, rows]
      properties:
        windowDays:
          type: integer
        totalRejections:
          type: integer
        previousTotal:
          type: integer
        rows:
          type: array
          items:
            type: object
            required:
              [errorCode, count, invoiceCount, clientCount, previousCount, lastSeen]
            properties:
              errorCode:
                type: string
              category:
                type: ["string", "null"]
              cause:
                type: ["string", "null"]
              fix:
                type: ["string", "null"]
              retriable:
                type: ["boolean", "null"]
              count:
                type: integer
              invoiceCount:
                type: integer
              clientCount:
                type: integer
              previousCount:
                type: integer
              lastSeen:
                type: string
    # Draft-time rejection risk: the firm's own recent rejected attempts
    # joined to THIS draft's supplier and buyer parties (plus the firm's top
    # codes), grounded in the error catalogue. Deterministic, nothing stored,
    # zero model calls — signals name history, never predictions.
    RejectionRiskReport:
      type: object
      required: [windowDays, totalRejections, signals]
      properties:
        windowDays:
          type: integer
        totalRejections:
          type: integer
        signals:
          type: array
          items:
            type: object
            required: [errorCode, scope, count, lastSeen]
            properties:
              errorCode:
                type: string
              scope:
                type: string
                enum: [supplier, buyer, firm]
              count:
                type: integer
              lastSeen:
                type: string
              category:
                type: ["string", "null"]
              cause:
                type: ["string", "null"]
              fix:
                type: ["string", "null"]
              retriable:
                type: ["boolean", "null"]
    CancelInvoiceInput:
      type: object
      required: [reason]
      properties:
        reason:
          type: string
          minLength: 1
    CreditNoteInput:
      type: object
      required: [reason]
      properties:
        reason:
          type: string
          minLength: 1
        # Reference of the stamped credit-note document issued on the rail;
        # generated when omitted so demo flows stay one-click.
        creditNoteNumber:
          type: string

    Message:
      type: object
      required: [id, channel, recipientRef, templateKey, status, createdAt]
      properties:
        id:
          type: string
        channel:
          type: string
          enum: [whatsapp, sms, email, push]
        recipientRef:
          type: string
        templateKey:
          type: string
        entityType:
          type: ["string", "null"]
        entityId:
          type: ["string", "null"]
        status:
          type: string
          enum: [queued, sent, delivered, failed]
        providerMessageId:
          type: ["string", "null"]
        failoverFrom:
          type: ["string", "null"]
        createdAt:
          type: string
          format: date-time
    MessageInput:
      type: object
      required: [channel, recipientRef, templateKey]
      properties:
        channel:
          type: string
          enum: [whatsapp, sms, email, push]
        recipientRef:
          type: string
        templateKey:
          type: string
        entityType:
          type: string
        entityId:
          type: string
    MessageDeliveryInput:
      type: object
      required: [delivered]
      properties:
        delivered:
          type: boolean

    FeatureFlag:
      type: object
      required: [key, enabled, releaseTag, updatedAt]
      properties:
        key:
          type: string
        enabled:
          type: boolean
