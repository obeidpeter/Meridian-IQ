          type: ["integer", "null"]
        # Clerk escalation-triage proposal: suggested routing the operator
        # accepts or overrides. Absent until the triage sweep (opt-in
        # clerk_triage flag) has classified the case; status "failed" means
        # classification was discarded and the card shows nothing.
        triage:
          type: ["object", "null"]
