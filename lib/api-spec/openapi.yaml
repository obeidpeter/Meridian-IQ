openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  # The version is the frontend/server build handshake: codegen embeds it in
  # both generated clients AND the server (via @workspace/api-zod), /healthz
  # reports the server's copy, and the web apps show a "stale server build"
  # banner on mismatch. Bump it whenever the contract changes.
  version: 0.6.0
  description: MeridianIQ platform API — data spine, compliance rails and consent.
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
  - name: auth
  - name: identity
  - name: parties
  - name: engagements
  - name: invoices
  - name: lifecycle
  - name: consent
  - name: verification
  - name: messaging
  - name: platform
  - name: operator
  - name: audit
  - name: console
  - name: billing
  - name: statements
  - name: reconciliation
  - name: buyer
  - name: b2c
  - name: whitelabel
  - name: certification
  - name: connectors
  - name: claims
  - name: clerk
  - name: recurring
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /me:
    get:
      operationId: getMe
      tags: [identity]
      summary: Resolve the current principal and capabilities
      responses:
        "200":
          description: Current principal
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Me"
        "401":
          $ref: "#/components/responses/Unauthorized"


  /auth/login:
    post:
      operationId: login
      tags: [auth]
      summary: Email + password sign-in; sets the HttpOnly session cookie
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginInput"
      responses:
        "200":
          description: Signed in; principal returned and session cookie set
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Me"
        "401":
          $ref: "#/components/responses/Unauthorized"
  /auth/logout:
    post:
      operationId: logout
      tags: [auth]
      summary: Clear the session cookie
      responses:
        "204":
          description: Signed out
  /auth/change-password:
    post:
      operationId: changePassword
      tags: [auth]
      summary: Change the signed-in account's password (SEC-02)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ChangePasswordInput"
      responses:
        "204":
          description: Password changed
        "401":
          $ref: "#/components/responses/Unauthorized"

  /firms:
    get:
      operationId: listFirms
      tags: [identity]
      responses:
        "200":
          description: Firms
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Firm"
    post:
      operationId: createFirm
      tags: [identity]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/FirmInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Firm"
  /firms/{id}:
    get:
      operationId: getFirm
      tags: [identity]
      parameters:
        - $ref: "#/components/parameters/IdParam"
      responses:
        "200":
          description: Firm
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Firm"
        "404":
          $ref: "#/components/responses/NotFound"

  /users:
    post:
      operationId: createUser
      tags: [identity]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UserInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
  /memberships:
    post:
      operationId: createMembership
      tags: [identity]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MembershipInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Membership"

  /parties:
    get:
      operationId: listParties
      tags: [parties]
      parameters:
        - name: q
          in: query
          required: false
          description: Matches the legal name or TIN.
          schema:
            type: string
            maxLength: 120
      responses:
        "200":
          description: Parties
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Party"
    post:
      operationId: createParty
      tags: [parties]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PartyInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Party"
        "400":
          $ref: "#/components/responses/BadRequest"
  /parties/{id}:
    get:
      operationId: getParty
      tags: [parties]
      parameters:
        - $ref: "#/components/parameters/IdParam"
      responses:
        "200":
          description: Party
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Party"
        "404":
          $ref: "#/components/responses/NotFound"
    patch:
      operationId: updateParty
      tags: [parties]
      parameters:
        - $ref: "#/components/parameters/IdParam"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PartyUpdateInput"
      responses:
        "200":
          description: Updated party
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Party"
        "400":
          $ref: "#/components/responses/BadRequest"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"
  /parties/merge:
    post:
      operationId: mergeParties
      tags: [parties]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PartyMergeInput"
      responses:
        "204":
          description: Merged
        "400":
          $ref: "#/components/responses/BadRequest"
  /parties/{id}/split:
    post:
      operationId: splitParty
      tags: [parties]
      parameters:
        - $ref: "#/components/parameters/IdParam"
      responses:
        "204":
          description: Split
        "409":
          $ref: "#/components/responses/Conflict"
  /parties/validate-tin:
    post:
      operationId: validateTin
      tags: [parties]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TinCheckInput"
      responses:
        "200":
          description: Result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/IdentifierCheck"
  /parties/validate-cac:
    post:
      operationId: validateCac
      tags: [parties]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CacCheckInput"
      responses:
        "200":
          description: Result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/IdentifierCheck"

  /parties/{id}/consent:
    get:
      operationId: listConsent
      tags: [consent]
      parameters:
        - $ref: "#/components/parameters/IdParam"
      responses:
        "200":
          description: Consent history
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ConsentRecord"
    post:
      operationId: recordConsent
      tags: [consent]
      parameters:
        - $ref: "#/components/parameters/IdParam"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ConsentInput"
      responses:
        "201":
          description: Recorded
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ConsentRecord"
  /parties/{id}/consent/check/{purpose}:
    get:
      operationId: checkConsent
      tags: [consent]
      parameters:
        - $ref: "#/components/parameters/IdParam"
        - name: purpose
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Permission decision
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ConsentDecision"

  /engagements:
    get:
      operationId: listEngagements
      tags: [engagements]
      responses:
        "200":
          description: Engagements
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Engagement"
    post:
      operationId: createEngagement
      tags: [engagements]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/EngagementInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Engagement"
  /engagements/{id}:
    get:
      operationId: getEngagement
      tags: [engagements]
      parameters:
        - $ref: "#/components/parameters/IdParam"
      responses:
        "200":
          description: Engagement
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Engagement"
        "404":
          $ref: "#/components/responses/NotFound"
    patch:
      operationId: updateEngagement
      tags: [engagements]
      parameters:
        - $ref: "#/components/parameters/IdParam"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/EngagementUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Engagement"

  /invoices:
    get:
      operationId: listInvoices
      tags: [invoices]
      description: >-
        Without limit/offset/q the full tenant-scoped list is returned oldest
        first (legacy behaviour, kept for existing clients). When any of the
        paging/search parameters are present the list is returned NEWEST first
        and bounded (limit defaults to 50).
      parameters:
        - name: status
          in: query
          required: false
          schema:
            type: string
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 200
        - name: offset
          in: query
          required: false
          schema:
            type: integer
            minimum: 0
        - name: q
          in: query
          required: false
          description: Matches the invoice number or either party's legal name.
          schema:
            type: string
            maxLength: 120
      responses:
        "200":
          description: Invoices
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Invoice"
    post:
      operationId: createInvoice
      tags: [invoices]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/InvoiceInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InvoiceDetail"
        "400":
          $ref: "#/components/responses/BadRequest"
  /invoices/export:
    get:
      operationId: exportInvoicesCsv
      tags: [invoices]
      summary: Download the tenant-scoped invoice list as CSV
      parameters:
        - name: status
          in: query
          required: false
          schema:
            type: string
        - name: q
          in: query
          required: false
          schema:
            type: string
            maxLength: 120
      responses:
        "200":
          description: CSV file (Content-Disposition attachment)
          content:
            text/csv:
              schema:
                type: string
  /dashboard/receivables/export:
    get:
      operationId: exportReceivablesCsv
      tags: [sme]
      summary: Download the client's outstanding receivables with aging as CSV
      parameters:
        - name: clientPartyId
          in: query
          required: true
          schema:
            type: string
      responses:
        "200":
          description: CSV file (Content-Disposition attachment)
          content:
            text/csv:
              schema:
                type: string
  /invoices/bulk-submit:
    post:
      operationId: bulkSubmitInvoices
      tags: [invoices]
      summary: Validate and submit a client's pending drafts in one batch
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BulkSubmitInput"
      responses:
        "200":
          description: Per-invoice outcomes for the processed batch
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BulkSubmitResult"
        "400":
          $ref: "#/components/responses/BadRequest"
        "403":
          $ref: "#/components/responses/Forbidden"
  /invoices/{id}:
    get:
      operationId: getInvoice
      tags: [invoices]
      parameters:
        - $ref: "#/components/parameters/IdParam"
      responses:
        "200":
          description: Invoice with lines
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InvoiceDetail"
        "404":
          $ref: "#/components/responses/NotFound"
    patch:
      operationId: updateInvoice
      tags: [invoices]
      parameters:
        - $ref: "#/components/parameters/IdParam"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/InvoiceUpdateInput"
      responses:
        "200":
          description: Updated invoice with lines
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InvoiceDetail"
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"
  /invoices/{id}/validate:
    post:
      operationId: validateInvoice
      tags: [invoices]
      parameters:
        - $ref: "#/components/parameters/IdParam"
      responses:
        "200":
          description: Validation result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ValidationResult"
  /invoices/{id}/submit:
    post:
      operationId: submitInvoice
      tags: [invoices]
      parameters:
        - $ref: "#/components/parameters/IdParam"
      responses:
        "202":
          description: Accepted for async submission
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Invoice"
        "403":
          $ref: "#/components/responses/Forbidden"
        "409":
          $ref: "#/components/responses/Conflict"
  /invoices/{id}/ubl:
    get:
      operationId: getInvoiceUbl
      tags: [invoices]
      parameters:
        - $ref: "#/components/parameters/IdParam"
      responses:
        "200":
          description: UBL representation
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UblDocument"
  /invoices/{id}/canonical:
    get:
      operationId: getInvoiceCanonical
      tags: [invoices]
      parameters:
        - $ref: "#/components/parameters/IdParam"
      responses:
        "200":
          description: Canonical representation
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CanonicalInvoice"
  /invoices/{id}/stamp:
    get:
      operationId: getInvoiceStamp
      tags: [lifecycle]
      parameters:
        - $ref: "#/components/parameters/IdParam"
      responses:
        "200":
          description: Stamp record
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StampRecord"
        "404":
          $ref: "#/components/responses/NotFound"
  /invoices/{id}/attempts:
    get:
      operationId: listSubmissionAttempts
      tags: [lifecycle]
      parameters:
        - $ref: "#/components/parameters/IdParam"
      responses:
        "200":
          description: Submission attempts
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/SubmissionAttempt"
  /invoices/{id}/cancel:
    post:
      operationId: cancelInvoice
      tags: [lifecycle]
      parameters:
        - $ref: "#/components/parameters/IdParam"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CancelInvoiceInput"
      responses:
        "200":
          description: Cancelled
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Invoice"
        "409":
          $ref: "#/components/responses/Conflict"
  /invoices/{id}/credit-note:
    post:
      operationId: creditNoteInvoice
      tags: [lifecycle]
      summary: Issue a credit note against a stamped invoice (CORE-09)
      parameters:
        - $ref: "#/components/parameters/IdParam"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreditNoteInput"
      responses:
        "202":
          description: >-
            Credit note created and submitted for stamping; the original
            transitions to credited when the credit note stamps (C1 async).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Invoice"
        "409":
          $ref: "#/components/responses/Conflict"

  /invoices/{id}/confirmations:
    get:
      operationId: listConfirmations
      tags: [lifecycle]
      parameters:
        - $ref: "#/components/parameters/IdParam"
      responses:
        "200":
          description: Confirmations
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Confirmation"
    post:
      operationId: createConfirmation
      tags: [lifecycle]
      parameters:
        - $ref: "#/components/parameters/IdParam"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ConfirmationInput"
      responses:
        "201":
          description: Recorded
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Confirmation"

  /invoices/{id}/settlements:
    get:
      operationId: listSettlements
      tags: [lifecycle]
      parameters:
        - $ref: "#/components/parameters/IdParam"
      responses:
        "200":
          description: Settlement events
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/SettlementEvent"
    post:
      operationId: createSettlement
      tags: [lifecycle]
      parameters:
        - $ref: "#/components/parameters/IdParam"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SettlementInput"
      responses:
        "201":
          description: Recorded
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SettlementEvent"

  /verify-stamp:
    post:
      operationId: verifyStamp
      tags: [verification]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/StampVerifyInput"
      responses:
        "200":
          description: Verification result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StampVerifyResult"

  /messages:
    get:
      operationId: listMessages
      tags: [messaging]
      summary: Recent outbound messages with delivery status (PL-04)
      responses:
        "200":
          description: Messages, newest first (bounded)
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Message"
    post:
      operationId: sendMessage
      tags: [messaging]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MessageInput"
      responses:
        "201":
          description: Sent
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Message"
        "400":
          $ref: "#/components/responses/BadRequest"
  /messages/{id}/delivery:
    post:
      operationId: recordMessageDelivery
      tags: [messaging]
      parameters:
        - $ref: "#/components/parameters/IdParam"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MessageDeliveryInput"
      responses:
        "204":
          description: Recorded

  /feature-flags:
    get:
      operationId: listFeatureFlags
      tags: [platform]
      responses:
        "200":
          description: Flags
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/FeatureFlag"
  /feature-flags/{key}:
    patch:
      operationId: updateFeatureFlag
      tags: [platform]
      parameters:
        - $ref: "#/components/parameters/KeyParam"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/FeatureFlagUpdate"
      responses:
        "204":
          description: Updated
  /feature-flags/{key}/override:
    post:
      operationId: setFeatureFlagOverride
      tags: [platform]
      parameters:
        - $ref: "#/components/parameters/KeyParam"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/FeatureFlagOverrideInput"
      responses:
        "204":
          description: Set

  /error-catalogue:
    get:
      operationId: listErrorCatalogue
      tags: [operator]
      responses:
        "200":
          description: Error catalogue
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ErrorCatalogueEntry"
    post:
      operationId: upsertErrorCatalogueEntry
      tags: [operator]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ErrorCatalogueUpsertInput"
      responses:
        "201":
          description: Created or updated catalogue entry
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorCatalogueEntry"
  /error-catalogue/{code}:
    get:
      operationId: getErrorCatalogueEntry
      tags: [operator]
      parameters:
        - $ref: "#/components/parameters/CodeParam"
      responses:
        "200":
          description: Catalogue entry
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorCatalogueEntry"
        "404":
          $ref: "#/components/responses/NotFound"
    patch:
      operationId: updateErrorCatalogueEntry
      tags: [operator]
      parameters:
        - $ref: "#/components/parameters/CodeParam"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ErrorCatalogueUpdate"
      responses:
        "200":
          description: Updated catalogue entry
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorCatalogueEntry"
        "404":
          $ref: "#/components/responses/NotFound"
  /error-catalogue/unmapped:
    get:
      operationId: listUnmappedErrorCodes
      tags: [operator]
      summary: Failure codes seen on submissions with no catalogue entry (INT-02)
      responses:
        "200":
          description: Unmapped error codes, most recent first
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/UnmappedErrorCode"
  /operator/gate-metrics:
    get:
      operationId: getGateMetrics
      tags: [operator]
      summary: Live measurements of the roadmap release-gate metrics
      responses:
        "200":
          description: Gate metrics computed from the spine
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GateMetrics"
  /operator/dead-letters:
    get:
      operationId: listDeadLetters
      tags: [operator]
      responses:
        "200":
          description: Dead-lettered events
          content:
            application/json:
              schema:
                type: array
                items:
