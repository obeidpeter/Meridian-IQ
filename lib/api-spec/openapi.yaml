openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  # The version is the frontend/server build handshake: codegen embeds it in
  # both generated clients AND the server (via @workspace/api-zod), /healthz
  # reports the server's copy, and the web apps show a "stale server build"
  # banner on mismatch. Bump it whenever the contract changes.
  version: 0.40.0
  description: MeridianIQ platform API — data spine, compliance rails and consent.
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
  - name: auth
  - name: identity
  - name: parties
  - name: engagements
  - name: invoices
  - name: lifecycle
  - name: consent
  - name: verification
  - name: messaging
  - name: platform
  - name: operator
  - name: audit
  - name: console
  - name: billing
  - name: statements
  - name: reconciliation
  - name: buyer
  - name: b2c
  - name: whitelabel
  - name: certification
  - name: connectors
  - name: claims
  - name: clerk
  - name: recurring
  - name: invitation
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /me:
    get:
      operationId: getMe
      tags: [identity]
      summary: Resolve the current principal and capabilities
      responses:
        "200":
          description: Current principal
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Me"
        "401":
          $ref: "#/components/responses/Unauthorized"


  /auth/login:
    post:
      operationId: login
      tags: [auth]
      summary: Email + password sign-in; sets the HttpOnly session cookie
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginInput"
      responses:
        "200":
          description: Signed in; principal returned and session cookie set
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Me"
        "401":
          $ref: "#/components/responses/Unauthorized"
  /auth/logout:
    post:
      operationId: logout
      tags: [auth]
      summary: Clear the session cookie
      responses:
        "204":
          description: Signed out
  /auth/totp/challenge:
    post:
      operationId: totpChallenge
      tags: [auth]
      summary: Redeem a login mfaToken plus a TOTP or recovery code for the session cookie
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TotpChallengeInput"
      responses:
        "200":
          description: Signed in; principal returned and session cookie set
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Me"
        "401":
          $ref: "#/components/responses/Unauthorized"
  /auth/totp/status:
    get:
      operationId: getTotpStatus
      tags: [auth]
      summary: Whether the signed-in user has TOTP enabled
      responses:
        "200":
          description: Enrolment state
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TotpStatus"
  /auth/totp/setup:
    post:
      operationId: setupTotp
      tags: [auth]
      summary: Begin TOTP enrolment — returns the secret, otpauth URI and recovery codes (shown once)
      responses:
        "200":
          description: Pending enrolment; activate with a valid code
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TotpSetup"
        "409":
          $ref: "#/components/responses/Conflict"
  /auth/totp/activate:
    post:
      operationId: activateTotp
      tags: [auth]
      summary: Confirm enrolment with a valid code; revokes other sessions
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TotpActivateInput"
      responses:
        "200":
          description: TOTP enabled
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TotpStatus"
        "400":
          $ref: "#/components/responses/BadRequest"
  /auth/totp/disable:
    post:
      operationId: disableTotp
      tags: [auth]
      summary: Disable TOTP — requires the password and a current code; revokes other sessions
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TotpDisableInput"
      responses:
        "200":
          description: TOTP disabled
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TotpStatus"
        "401":
          $ref: "#/components/responses/Unauthorized"
  /auth/change-password:
    post:
      operationId: changePassword
      tags: [auth]
      summary: Change the signed-in account's password (SEC-02)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ChangePasswordInput"
      responses:
        "204":
          description: Password changed
        "401":
          $ref: "#/components/responses/Unauthorized"

  /auth/accept-invite:
    post:
      operationId: acceptInvite
      tags: [invitation]
      summary: Redeem an invitation token, setting a password and creating the account (public)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AcceptInvitationInput"
      responses:
        "204":
          description: Account created; sign in with the new password
        "400":
          $ref: "#/components/responses/BadRequest"
        "409":
          description: An account with this email already exists

  /auth/reset-password:
    post:
      operationId: resetPassword
      tags: [auth]
      summary: Redeem a one-time password-reset token and set a new password (public)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ResetPasswordInput"
      responses:
        "204":
          description: Password set; sign in with it (outstanding sessions are revoked)
        "400":
          $ref: "#/components/responses/BadRequest"

  /password-resets:
    post:
      operationId: createPasswordReset
      tags: [identity]
      summary: Issue a one-time password-reset link for a user (operator support path); returns the token once
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreatePasswordResetInput"
      responses:
        "201":
          description: Reset issued (token shown once)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PasswordResetWithToken"
        "404":
          $ref: "#/components/responses/NotFound"

  /invitations:
    get:
      operationId: listInvitations
      tags: [invitation]
      summary: List the firm's invitations
      responses:
        "200":
          description: Invitations
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Invitation"
    post:
      operationId: createInvitation
      tags: [invitation]
      summary: Invite a teammate or client into the caller's firm (operators name a target firm); returns the one-time token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateInvitationInput"
      responses:
        "201":
          description: Invitation created (token shown once)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InvitationWithToken"
        "400":
          $ref: "#/components/responses/BadRequest"
  /invitations/{id}/revoke:
    post:
      operationId: revokeInvitation
      tags: [invitation]
      summary: Revoke a pending invitation
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Revoked
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Invitation"
        "404":
          description: Invitation not found

  /firms:
    get:
      operationId: listFirms
      tags: [identity]
      responses:
        "200":
          description: Firms
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Firm"
    post:
      operationId: createFirm
      tags: [identity]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/FirmInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Firm"
  /firms/{id}:
    get:
      operationId: getFirm
      tags: [identity]
      parameters:
        - $ref: "#/components/parameters/IdParam"
      responses:
        "200":
          description: Firm
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Firm"
        "404":
          $ref: "#/components/responses/NotFound"

  /users:
    post:
      operationId: createUser
      tags: [identity]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UserInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
  /memberships:
    post:
      operationId: createMembership
      tags: [identity]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MembershipInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Membership"

  /parties:
    get:
      operationId: listParties
      tags: [parties]
      parameters:
        - name: q
          in: query
          required: false
          description: Matches the legal name or TIN.
          schema:
            type: string
            maxLength: 120
      responses:
        "200":
          description: Parties
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Party"
    post:
      operationId: createParty
      tags: [parties]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PartyInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Party"
        "400":
          $ref: "#/components/responses/BadRequest"
  /parties/{id}:
    get:
      operationId: getParty
      tags: [parties]
      parameters:
        - $ref: "#/components/parameters/IdParam"
      responses:
        "200":
          description: Party
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Party"
        "404":
          $ref: "#/components/responses/NotFound"
    patch:
      operationId: updateParty
      tags: [parties]
      parameters:
        - $ref: "#/components/parameters/IdParam"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PartyUpdateInput"
      responses:
        "200":
          description: Updated party
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Party"
        "400":
          $ref: "#/components/responses/BadRequest"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"
  /parties/merge-impact:
    get:
      operationId: getMergeImpact
      tags: [parties]
      summary: What each side of a proposed party merge carries (deterministic counts)
      parameters:
        - name: survivorId
          in: query
          required: true
          schema:
            type: string
            format: uuid
        - name: duplicateId
          in: query
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Per-side reference counts; a side is null when the party does not exist
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MergeImpact"
  /parties/merge:
    post:
      operationId: mergeParties
      tags: [parties]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PartyMergeInput"
      responses:
        "204":
          description: Merged
        "400":
          $ref: "#/components/responses/BadRequest"
  /parties/{id}/split:
    post:
      operationId: splitParty
      tags: [parties]
      parameters:
        - $ref: "#/components/parameters/IdParam"
      responses:
        "204":
          description: Split
        "409":
          $ref: "#/components/responses/Conflict"
  /parties/validate-tin:
    post:
      operationId: validateTin
      tags: [parties]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TinCheckInput"
      responses:
        "200":
          description: Result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/IdentifierCheck"
  /parties/validate-cac:
    post:
      operationId: validateCac
      tags: [parties]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CacCheckInput"
      responses:
        "200":
          description: Result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/IdentifierCheck"

  /parties/{id}/consent:
    get:
      operationId: listConsent
      tags: [consent]
      parameters:
        - $ref: "#/components/parameters/IdParam"
      responses:
        "200":
          description: Consent history
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ConsentRecord"
    post:
      operationId: recordConsent
      tags: [consent]
      parameters:
        - $ref: "#/components/parameters/IdParam"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ConsentInput"
      responses:
        "201":
          description: Recorded
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ConsentRecord"
  /parties/{id}/consent/check/{purpose}:
    get:
      operationId: checkConsent
      tags: [consent]
      parameters:
        - $ref: "#/components/parameters/IdParam"
        - name: purpose
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Permission decision
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ConsentDecision"

  /engagements:
    get:
      operationId: listEngagements
      tags: [engagements]
      responses:
        "200":
          description: Engagements
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Engagement"
    post:
      operationId: createEngagement
      tags: [engagements]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/EngagementInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Engagement"
  /engagements/{id}:
    get:
      operationId: getEngagement
      tags: [engagements]
      parameters:
        - $ref: "#/components/parameters/IdParam"
      responses:
        "200":
          description: Engagement
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Engagement"
        "404":
          $ref: "#/components/responses/NotFound"
    patch:
      operationId: updateEngagement
      tags: [engagements]
      parameters:
        - $ref: "#/components/parameters/IdParam"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/EngagementUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Engagement"

  /invoices:
    get:
      operationId: listInvoices
      tags: [invoices]
      description: >-
        Without limit/offset/q the full tenant-scoped list is returned oldest
        first (legacy behaviour, kept for existing clients). When any of the
        paging/search parameters are present the list is returned NEWEST first
        and bounded (limit defaults to 50).
      parameters:
        - name: status
          in: query
          required: false
          schema:
            type: string
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 200
        - name: offset
          in: query
          required: false
          schema:
            type: integer
            minimum: 0
        - name: q
          in: query
          required: false
          description: Matches the invoice number or either party's legal name.
          schema:
            type: string
            maxLength: 120
      responses:
        "200":
          description: Invoices
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Invoice"
    post:
      operationId: createInvoice
      tags: [invoices]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/InvoiceInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InvoiceDetail"
        "400":
          $ref: "#/components/responses/BadRequest"
  /invoices/export:
    get:
      operationId: exportInvoicesCsv
      tags: [invoices]
      summary: Download the tenant-scoped invoice list as CSV
      parameters:
        - name: status
          in: query
          required: false
          schema:
            type: string
        - name: q
          in: query
          required: false
          schema:
            type: string
            maxLength: 120
      responses:
        "200":
          description: CSV file (Content-Disposition attachment)
          content:
            text/csv:
              schema:
                type: string
  /dashboard/receivables/export:
    get:
      operationId: exportReceivablesCsv
      tags: [sme]
      summary: Download the client's outstanding receivables with aging as CSV
      parameters:
        - name: clientPartyId
          in: query
          required: true
          schema:
            type: string
      responses:
        "200":
          description: CSV file (Content-Disposition attachment)
          content:
            text/csv:
              schema:
                type: string
  /vat-pack:
    get:
      operationId: getVatPack
      tags: [invoices]
      summary: Firm-level monthly VAT filing pack — per-client output VAT for a closed Lagos month
      parameters:
        - name: month
          in: query
          required: false
          description: A closed Lagos month's first day (YYYY-MM-01); defaults to the newest closed month.
          schema:
            type: string
            pattern: '^\d{4}-\d{2}-01$'
      responses:
        "200":
          description: Per-client VAT table with firm totals (deterministic — no model involvement)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VatPack"
        "400":
          $ref: "#/components/responses/BadRequest"
  /vat-pack/export:
    get:
      operationId: exportVatPackCsv
      tags: [invoices]
      summary: Download the monthly VAT filing pack as CSV
      parameters:
        - name: month
          in: query
          required: false
          schema:
            type: string
            pattern: '^\d{4}-\d{2}-01$'
      responses:
        "200":
          description: CSV file (Content-Disposition attachment)
          content:
            text/csv:
              schema:
                type: string
        "400":
          $ref: "#/components/responses/BadRequest"
  /billing/statement:
    get:
      operationId: getBillingStatement
      tags: [invoices]
      summary: Deterministic monthly platform-billing statement for the firm — tier, metered usage, computed fee (nothing stored)
      parameters:
        - name: month
          in: query
          required: false
          schema:
            type: string
            pattern: '^\d{4}-\d{2}-01$'
      responses:
        "200":
          description: Billing statement for a closed month
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BillingStatement"
        "400":
          $ref: "#/components/responses/BadRequest"
  /billing/statement/export:
    get:
      operationId: exportBillingStatementCsv
      tags: [invoices]
      summary: Download the monthly billing statement as CSV
      parameters:
        - name: month
          in: query
          required: false
          schema:
            type: string
            pattern: '^\d{4}-\d{2}-01$'
      responses:
        "200":
          description: CSV file (Content-Disposition attachment)
          content:
            text/csv:
              schema:
                type: string
        "400":
          $ref: "#/components/responses/BadRequest"
  /notifications:
    get:
      operationId: listNotifications
      tags: [messaging]
      summary: The signed-in user's own notification feed, resolved from the pointer-only messages ledger
      parameters:
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 100
      responses:
        "200":
          description: Newest-first feed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NotificationFeed"
  /firms/{id}/export:
    get:
      operationId: exportFirmData
      tags: [audit]
      summary: Full-firm portability export (operator-gated) — invoices, parties, statements, consent trail, firm-scoped audit events
      parameters:
        - $ref: "#/components/parameters/IdParam"
      responses:
        "200":
          description: Export bundle
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FirmExportBundle"
        "404":
          $ref: "#/components/responses/NotFound"
  /vat-pack/cover-note:
    post:
      operationId: draftVatPackCoverNote
      tags: [invoices]
      summary: Draft a cover note phrasing the VAT pack's computed facts (template fallback; nothing stored — the partner edits and owns it)
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DraftVatCoverNoteInput"
      responses:
        "200":
          description: The drafted note plus the pack's basis disclosure
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VatPackCoverNote"
        "400":
          $ref: "#/components/responses/BadRequest"
  /vat-pack/settlement-check:
    get:
      operationId: getVatSettlementCheck
      tags: [invoices]
      summary: Settlement coverage of the pack month's accepted invoices (assurance view — unsettled means unobserved, not unpaid)
      parameters:
        - name: month
          in: query
          required: false
          description: A closed Lagos month's first day (YYYY-MM-01); defaults to the newest closed month.
          schema:
            type: string
            pattern: '^\d{4}-\d{2}-01$'
      responses:
        "200":
          description: Settled/outstanding/credited split of the month's accepted value plus the unsettled list (deterministic — no model involvement)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VatSettlementCheck"
        "400":
          $ref: "#/components/responses/BadRequest"
  /quarterly-review:
    get:
      operationId: getQuarterlyReview
      tags: [invoices]
      summary: Firm quarterly review pack — the closed quarter's monthly VAT packs, submissions, rejections, receivables snapshot and Clerk throughput in one deterministic document
      parameters:
        - name: quarter
          in: query
          required: false
          description: First month of a closed Lagos quarter (YYYY-MM-01); defaults to the newest closed quarter.
          schema:
            type: string
            pattern: '^\d{4}-\d{2}-01$'
      responses:
        "200":
          description: The assembled quarterly review (deterministic — no model involvement)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/QuarterlyReview"
        "400":
          $ref: "#/components/responses/BadRequest"
  /quarterly-review/cover-note:
    post:
      operationId: draftQuarterlyCoverNote
      tags: [invoices]
      summary: Draft a cover note phrasing the quarterly review's computed facts (template fallback; nothing stored — the partner edits and owns it)
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DraftQuarterlyNoteInput"
      responses:
        "200":
          description: The drafted note plus the pack's basis disclosure
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/QuarterlyReviewCoverNote"
