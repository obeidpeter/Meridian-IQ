          description: Grounded explanation (Clerk-phrased when available, catalogue text otherwise)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FailureExplanation"
        "404":
          $ref: "#/components/responses/NotFound"

  /clerk/draft-chaser:
    post:
      operationId: draftPaymentChaser
      tags: [clerk]
      summary: A payment-reminder draft for one outstanding receivable, grounded in stored facts (template fallback, nothing stored)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DraftPaymentChaserInput"
      responses:
        "200":
          description: A sendable reminder (Clerk-phrased when available, deterministic template otherwise)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PaymentChaserDraft"
        "404":
          $ref: "#/components/responses/NotFound"
        "422":
          description: The invoice is not an outstanding receivable

  /clerk/tier-report:
    get:
      operationId: getClerkTierReport
      tags: [clerk]
      summary: Per-purpose model-tier evidence and deterministic recommendations from the inference ledger (pure SQL)
      responses:
        "200":
          description: Spend, validity and tier recommendations per purpose over the trailing window
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ClerkTierReport"

  /clerk/reconciliation-assist:
    post:
      operationId: assistMatchProposals
      tags: [clerk]
      summary: Grounded explanation of a statement line's match candidates (template fallback)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AssistMatchProposalsInput"
      responses:
        "200":
          description: Deterministic ranking + highlights; Clerk-phrased comparison when available
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MatchAssist"
        "404":
          $ref: "#/components/responses/NotFound"

  /clerk/draft-invoice:
    post:
      operationId: draftInvoiceWithClerk
      tags: [clerk]
      summary: Draft an invoice form from one sentence — returned for review, never saved
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DraftInvoiceWithClerkInput"
      responses:
        "200":
          description: Normalised form proposal plus deterministic buyer suggestions
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InvoiceDraftResult"
        "400":
          $ref: "#/components/responses/BadRequest"
        "502":
          description: Clerk could not produce a valid draft (fail closed)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "503":
          description: Clerk AI disabled by the kill switch
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  # ---- Async batch intake (Clerk idea #8) ----
  /clerk/batches:
    post:
      operationId: createClerkBatch
      tags: [clerk]
      summary: Queue a month-end bundle — segmentation and extraction run out of band
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateClerkBatchInput"
      responses:
        "202":
          description: Queued; poll the batch for progress
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ClerkBatchView"
        "400":
          $ref: "#/components/responses/BadRequest"
        "422":
          description: The document could not be processed (unreadable PDF, or a scanned bundle past the 24-page cap)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "503":
          description: Clerk AI disabled by the kill switch
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
    get:
      operationId: listClerkBatches
      tags: [clerk]
      summary: The caller's recent batches, newest first
      responses:
        "200":
          description: Batches visible to the caller
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ClerkBatchView"
  /clerk/batches/{id}:
    get:
      operationId: getClerkBatch
      tags: [clerk]
      summary: One batch's live progress counters
      parameters:
        - $ref: "#/components/parameters/IdParam"
      responses:
        "200":
          description: The batch
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ClerkBatchView"
        "404":
          $ref: "#/components/responses/NotFound"

  /clerk/format-draft:
    post:
      operationId: draftStatementFormatWithClerk
      tags: [clerk]
      summary: Propose a statement-format column mapping from a sample — validated by the deterministic parser, never stored
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DraftStatementFormatInput"
      responses:
        "200":
          description: Draft mapping plus the parser's validation run over the sample
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StatementFormatDraft"
        "422":
          description: The sample has no readable header row
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "502":
          description: Clerk could not produce a usable mapping (fail closed)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "503":
          description: Clerk AI disabled by the kill switch
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /clerk/client-import-draft:
    post:
      operationId: draftClientImportWithClerk
      tags: [clerk]
      summary: Propose a column mapping for an arbitrary customer-list CSV — header-verified, parser-proven, never stored
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DraftClientImportInput"
      responses:
        "200":
          description: Verified mapping plus the deterministically parsed rows, ready for the ordinary import validate/commit flow
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ClientImportDraft"
        "422":
          description: The sample has no usable header/data rows
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "502":
          description: Clerk could not produce a usable mapping (fail closed)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "503":
          description: Clerk AI disabled by the kill switch
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /escalations/{id}/reply-draft:
    post:
      operationId: draftEscalationReply
      tags: [operator]
      summary: Draft a grounded reply to an escalation (catalogue fix + attempt history; template fallback; operator edits and sends)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: A reply draft — nothing is sent or stored
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EscalationReplyDraft"
        "404":
          $ref: "#/components/responses/NotFound"

  /escalations/{id}/reply:
    post:
      operationId: replyToEscalation
      tags: [operator]
      summary: Send the operator's reply to an escalation (acknowledges an open escalation)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ReplyToEscalationInput"
      responses:
        "200":
          description: The escalation with the reply recorded
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Escalation"
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"

  /clerk/usage:
    get:
      operationId: getClerkUsage
      tags: [clerk]
      summary: The firm's month-to-date Clerk token consumption against its allowance
      responses:
        "200":
          description: Usage for the caller's firm
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ClerkUsage"
        "400":
          $ref: "#/components/responses/BadRequest"

  /clerk/metrics:
    get:
      operationId: getClerkMetrics
      tags: [clerk]
      summary: Operational metrics from cases and the inference ledger (CLK-OBS-04)
      parameters:
        - name: windowDays
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 365
      responses:
        "200":
          description: Aggregated Clerk health metrics
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ClerkMetrics"

  /clerk/claim-gaps:
    get:
      operationId: getClerkClaimGaps
      tags: [clerk]
      summary: Refused Ask Clerk questions clustered by cause — the register's demand signal
      parameters:
        - name: windowDays
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 365
      responses:
        "200":
          description: Deterministic refusal-clustering report (pure SQL, zero model calls)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ClaimGapReport"
  /clerk/eval/model-canary:
    post:
      operationId: runModelCanary
      tags: [clerk]
      summary: Run the eval corpus under a CANDIDATE model side by side with the incumbent (spends tokens)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RunModelCanaryInput"
      responses:
        "200":
          description: Side-by-side scores and the deterministic verdict; nothing is stored
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ModelCanaryReport"
components:
  parameters:
    IdParam:
      name: id
      in: path
      required: true
      schema:
        type: string
    KeyParam:
      name: key
      in: path
      required: true
      schema:
        type: string
    CodeParam:
      name: code
      in: path
      required: true
      schema:
        type: string
  responses:
    BadRequest:
      description: Bad request
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
    Unauthorized:
      description: Unauthorized
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
    Forbidden:
      description: Forbidden
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
    NotFound:
      description: Not found
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
    Conflict:
      description: Conflict
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
        contractVersion:
          type: string
      required:
        - status
        - contractVersion
    Error:
      type: object
      properties:
        error:
          type: string
      required:
        - error

    Me:
      type: object
      required: [userId, role, capabilities]
      properties:
        userId:
          type: string
        role:
          type: string
        # Display identity for signed-in UI. Null for principals that do not
        # resolve to a users row (e.g. dev-header principals).
        email:
          type: ["string", "null"]
        fullName:
          type: ["string", "null"]
        firmId:
          type: ["string", "null"]
        clientPartyId:
          type: ["string", "null"]
        buyerPartyId:
          type: ["string", "null"]
        capabilities:
          type: array
          items:
            type: string
        # Bearer session token, returned ONLY by /auth/login for native mobile
        # clients that cannot rely on the HttpOnly cookie (Expo). Same signed
        # token as the cookie; sent as `Authorization: Bearer <token>`.
        token:
          type: ["string", "null"]
        # TOTP two-factor: when the account has TOTP enabled, /auth/login does
        # NOT set the session cookie; it returns mfaRequired=true plus a
        # short-lived signed mfaToken to redeem at /auth/totp/challenge.
        mfaRequired:
          type: boolean
        mfaToken:
          type: ["string", "null"]
    TotpChallengeInput:
      type: object
      required: [mfaToken, code]
      properties:
        mfaToken:
          type: string
        # A 6-digit TOTP code, or a one-time recovery code.
        code:
          type: string
          minLength: 6
          maxLength: 32
    TotpStatus:
      type: object
      required: [enabled]
      properties:
        enabled:
          type: boolean
        enabledAt:
          type: ["string", "null"]
        recoveryCodesRemaining:
          type: ["integer", "null"]
    TotpSetup:
      type: object
      required: [secret, otpauthUri, recoveryCodes]
      properties:
        # Base32 secret for manual entry; shown once, never retrievable again.
        secret:
          type: string
        otpauthUri:
          type: string
        recoveryCodes:
          type: array
          items:
            type: string
    TotpActivateInput:
      type: object
      required: [code]
      properties:
        code:
          type: string
          minLength: 6
          maxLength: 8
    TotpDisableInput:
      type: object
      required: [password, code]
      properties:
        password:
          type: string
          minLength: 1
        code:
          type: string
          minLength: 6
          maxLength: 32
    LoginInput:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          minLength: 3
        password:
          type: string
          minLength: 1
          maxLength: 256
    ChangePasswordInput:
      type: object
      required: [currentPassword, newPassword]
      properties:
        currentPassword:
          type: string
          minLength: 1
          maxLength: 256
        newPassword:
          type: string
          minLength: 8
          maxLength: 256

    Invitation:
      type: object
      required: [id, email, role, firmId, status, expiresAt, createdAt]
      properties:
        id:
          type: string
        email:
          type: string
        role:
          type: string
          enum: [firm_admin, firm_staff, client_user]
        firmId:
          type: string
        clientPartyId:
          type: ["string", "null"]
        status:
          type: string
          enum: [pending, accepted, revoked]
        expiresAt:
          type: string
          format: date-time
        acceptedAt:
          type: ["string", "null"]
          format: date-time
        createdAt:
          type: string
          format: date-time
    CreateInvitationInput:
      type: object
      required: [email, role]
      properties:
        email:
          type: string
          format: email
        role:
          type: string
          enum: [firm_admin, firm_staff, client_user]
        # Operators name the firm the invite targets (new-firm bootstrap: create
        # the firm, then invite its first firm_admin). Firm principals always
        # invite into their own firm and must omit or match this field.
        firmId:
          type: string
        # Required when role is client_user (the client Party the invitee scopes to).
        clientPartyId:
          type: string
    InvitationWithToken:
      type: object
      required: [invitation, token]
      properties:
        invitation:
          $ref: "#/components/schemas/Invitation"
        # The raw redemption token — shown ONCE. Share the accept link
        # /accept-invite?token=<token> with the invitee; only its hash is stored.
        token:
          type: string
    AcceptInvitationInput:
      type: object
      required: [token, password]
      properties:
        token:
          type: string
          minLength: 1
        password:
          type: string
          minLength: 8
          maxLength: 256
        fullName:
          type: string

    PasswordReset:
      type: object
      required: [id, email, status, expiresAt, createdAt]
      properties:
        id:
          type: string
        email:
          type: string
        status:
          type: string
          enum: [pending, used, revoked]
        expiresAt:
          type: string
          format: date-time
        createdAt:
          type: string
          format: date-time
    PasswordResetWithToken:
      type: object
      required: [reset, token]
      properties:
        reset:
          $ref: "#/components/schemas/PasswordReset"
        # The raw redemption token — shown ONCE. Share the reset link
        # /reset-password?token=<token> with the user; only its hash is stored.
        token:
          type: string
    CreatePasswordResetInput:
      type: object
      required: [email]
      properties:
        email:
          type: string
          format: email
    ResetPasswordInput:
      type: object
      required: [token, password]
      properties:
        token:
          type: string
          minLength: 1
        password:
          type: string
          minLength: 8
          maxLength: 256

    Firm:
      type: object
      required: [id, name, createdAt, updatedAt]
      properties:
        id:
          type: string
        name:
          type: string
        subdomain:
          type: ["string", "null"]
        clerkOrgId:
          type: ["string", "null"]
        partyId:
          type: ["string", "null"]
        theme:
          type: ["object", "null"]
          additionalProperties: true
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
    FirmInput:
