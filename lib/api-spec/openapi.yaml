        statementLineId:
          type: ["string", "null"]
        actorId:
          type: ["string", "null"]
        occurredAt:
          type: string
          format: date-time
        createdAt:
          type: string
          format: date-time
    SettlementInput:
      type: object
      required: [source, amount, occurredAt]
      properties:
        source:
          type: string
          enum: [statement_match, buyer_flag, collection_account, uploaded_evidence]
        amount:
          type: string
        confidence:
          type: string
        occurredAt:
          type: string
          format: date-time

    StampVerifyInput:
      type: object
      required: [irn, csid]
      properties:
        irn:
          type: string
        csid:
          type: string
    StampVerifyResult:
      type: object
      required: [valid, rail, cached, eligible]
      properties:
        valid:
          type: boolean
        rail:
          type: string
        cached:
          type: boolean
        # CORE-09: a cancelled or credited stamped invoice keeps a valid stamp
        # but must never be presented as eligible.
        eligible:
          type: boolean
        invoiceStatus:
          type: ["string", "null"]
    RecurringInvoiceTemplateInput:
      type: object
      required: [supplierPartyId, buyerPartyId, name, cadence, startDate, lines]
