        "400":
          $ref: "#/components/responses/BadRequest"
        "413":
          description: Upload exceeds the 5 MB limit
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "422":
          description: Document unreadable (e.g. PDF with no selectable text)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "503":
          description: Clerk AI disabled by the kill switch
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
