      responses:
        "200":
          description: The completed evaluation run with per-fixture results
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ClerkEvalRun"
  /clerk/eval/runs:
    get:
      operationId: listClerkEvalRuns
      tags: [clerk]
      summary: Past evaluation runs, newest first
      parameters:
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 100
      responses:
        "200":
          description: Evaluation runs
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ClerkEvalRun"
  /clerk/metrics:
    get:
      operationId: getClerkMetrics
      tags: [clerk]
      summary: Operational metrics from cases and the inference ledger (CLK-OBS-04)
      parameters:
        - name: windowDays
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 365
      responses:
        "200":
          description: Aggregated Clerk health metrics
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ClerkMetrics"

components:
  parameters:
    IdParam:
      name: id
      in: path
      required: true
      schema:
        type: string
    KeyParam:
      name: key
      in: path
      required: true
      schema:
        type: string
    CodeParam:
      name: code
      in: path
      required: true
      schema:
        type: string
  responses:
    BadRequest:
      description: Bad request
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
    Unauthorized:
      description: Unauthorized
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
    Forbidden:
      description: Forbidden
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
    NotFound:
      description: Not found
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
    Conflict:
      description: Conflict
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
        contractVersion:
          type: string
      required:
        - status
        - contractVersion
    Error:
      type: object
      properties:
        error:
          type: string
      required:
        - error

    Me:
      type: object
      required: [userId, role, capabilities]
      properties:
        userId:
          type: string
        role:
          type: string
        # Display identity for signed-in UI. Null for principals that do not
        # resolve to a users row (e.g. dev-header principals).
        email:
          type: ["string", "null"]
        fullName:
          type: ["string", "null"]
        firmId:
          type: ["string", "null"]
        clientPartyId:
          type: ["string", "null"]
        buyerPartyId:
          type: ["string", "null"]
        capabilities:
          type: array
          items:
            type: string
        # Bearer session token, returned ONLY by /auth/login for native mobile
        # clients that cannot rely on the HttpOnly cookie (Expo). Same signed
        # token as the cookie; sent as `Authorization: Bearer <token>`.
        token:
          type: ["string", "null"]
    LoginInput:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          minLength: 3
        password:
          type: string
          minLength: 1
    ChangePasswordInput:
      type: object
      required: [currentPassword, newPassword]
      properties:
        currentPassword:
          type: string
          minLength: 1
        newPassword:
          type: string
          minLength: 8

    Firm:
      type: object
      required: [id, name, createdAt, updatedAt]
      properties:
        id:
          type: string
        name:
          type: string
        subdomain:
          type: ["string", "null"]
        clerkOrgId:
          type: ["string", "null"]
        partyId:
          type: ["string", "null"]
        theme:
          type: ["object", "null"]
          additionalProperties: true
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
    FirmInput:
      type: object
      required: [name]
      properties:
        name:
          type: string
          minLength: 1
        subdomain:
          type: string
        partyId:
          type: string

    User:
      type: object
      required: [id, email, createdAt]
      properties:
        id:
          type: string
        email:
          type: string
        fullName:
          type: ["string", "null"]
        clerkUserId:
          type: ["string", "null"]
        createdAt:
          type: string
          format: date-time
    UserInput:
      type: object
      required: [email]
      properties:
        email:
          type: string
          minLength: 3
        fullName:
          type: string
        clerkUserId:
          type: string

    Membership:
      type: object
      required: [id, userId, role, createdAt]
      properties:
        id:
          type: string
        userId:
          type: string
        firmId:
          type: ["string", "null"]
        role:
          type: string
        clientPartyId:
          type: ["string", "null"]
        buyerPartyId:
          type: ["string", "null"]
        createdAt:
          type: string
          format: date-time
    MembershipInput:
      type: object
      required: [userId, role]
      properties:
        userId:
          type: string
        firmId:
          type: string
        role:
          type: string
          enum:
            [firm_admin, firm_staff, client_user, operator, bank_user, buyer_user, auditor]
        clientPartyId:
          type: string
        buyerPartyId:
          type: string

    Party:
      type: object
      required: [id, type, legalName, tinValidated, countryCode, createdAt, updatedAt]
      properties:
        id:
          type: string
        type:
          type: string
          enum: [client_business, buyer, firm, bank]
        legalName:
          type: string
        tin:
          type: ["string", "null"]
        tinValidated:
          type: boolean
        cacNumber:
          type: ["string", "null"]
        street:
          type: ["string", "null"]
        city:
          type: ["string", "null"]
        countryCode:
          type: string
        mergedIntoId:
          type: ["string", "null"]
        schemaVersion:
          type: integer
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
    PartyInput:
      type: object
      required: [type, legalName]
      properties:
        type:
          type: string
          enum: [client_business, buyer, firm, bank]
        legalName:
          type: string
          minLength: 1
        tin:
          type: string
        cacNumber:
          type: string
        street:
          type: string
        city:
          type: string
        countryCode:
          type: string
    PartyUpdateInput:
      type: object
      properties:
        legalName:
          type: string
          minLength: 1
        tin:
          type: ["string", "null"]
        cacNumber:
          type: ["string", "null"]
        street:
          type: ["string", "null"]
        city:
          type: ["string", "null"]
        countryCode:
          type: string
    PartyMergeInput:
      type: object
      required: [survivorId, duplicateId]
      properties:
        survivorId:
          type: string
        duplicateId:
          type: string
    TinCheckInput:
      type: object
      required: [tin]
      properties:
        tin:
          type: string
    CacCheckInput:
      type: object
      required: [cac]
      properties:
        cac:
          type: string
    IdentifierCheck:
      type: object
      required: [valid, normalized]
      properties:
        valid:
          type: boolean
        normalized:
          type: string

    ConsentRecord:
      type: object
      required: [id, partyId, layer, action, scope, basis, channel, createdAt]
      properties:
        id:
          type: string
        partyId:
          type: string
        layer:
          type: integer
        action:
          type: string
          enum: [grant, revoke]
        scope:
          type: string
        basis:
          type: string
        channel:
          type: string
        createdAt:
          type: string
          format: date-time
    ConsentInput:
      type: object
      required: [layer, action, scope, basis, channel]
      properties:
        layer:
          type: integer
        action:
          type: string
